<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#d97706">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data: blob:;">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Spring B'Fast Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        button, input, textarea {
            touch-action: manipulation;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media print {
            body { background-color: white !important; color: black !important; font-size: 11px !important; line-height: 1.3 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-border { border: 1px solid #e5e7eb !important; }
            .print-shadow-none { box-shadow: none !important; }
            .page-break { page-break-before: always; }
            .avoid-break { page-break-inside: avoid; }
            
            .print\:p-0 { padding: 0 !important; }
            .print\:text-\[10px\] { font-size: 10px !important; }
            
            input, textarea { 
                border: none !important; 
                background: transparent !important;
                resize: none !important;
                padding: 0 !important;
            }
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
        }
        
        body.preview-mode { background-color: white !important; color: black !important; }
        body.preview-mode .no-print { display: none !important; }
        body.preview-mode .print-only { display: block !important; }
        body.preview-mode input, body.preview-mode textarea { 
            border: none !important; 
            background: transparent !important;
            pointer-events: none;
        }
        body.preview-mode #exit-preview-btn { display: flex !important; }

        .status-btn.selected-compliant { background-color: #10b981; color: white; border-color: #10b981; }
        .status-btn.selected-non-compliant { background-color: #ef4444; color: white; border-color: #ef4444; }
        .status-btn.selected-na { background-color: #64748b; color: white; border-color: #64748b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <button id="exit-preview-btn" onclick="app.togglePreview()" class="fixed bottom-8 right-8 bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold z-50 transition-transform hover:scale-105 hidden items-center gap-2">
        <i class="fa-solid fa-eye-slash"></i> Exit Preview
    </button>

    <!-- Dashboard -->
    <div id="dashboard-view" class="max-w-5xl mx-auto p-4 sm:p-6">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-10 mt-4 sm:mt-6 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i class="fa-solid fa-mug-hot text-amber-600"></i>
                    Spring B'Fast Audit
                </h1>
                <p class="text-sm sm:text-base text-slate-500 mt-1">Manage and file your Spring Breakfast Buffet audits.</p>
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <button onclick="app.createNewReport()" class="bg-amber-600 hover:bg-amber-700 text-white px-5 py-2.5 rounded-lg font-medium w-full sm:w-auto flex items-center justify-center gap-2 transition-colors shadow-sm">
                    <i class="fa-solid fa-plus"></i> New B'Fast Audit
                </button>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-200 bg-slate-50/50">
                <h2 class="text-lg font-semibold text-slate-800">Recent Reports</h2>
            </div>
            <div id="empty-state" class="p-12 text-center text-slate-500 flex flex-col items-center hidden">
                <i class="fa-solid fa-folder-open text-5xl text-slate-300 mb-4"></i>
                <p class="text-lg">No audit reports filed yet.</p>
            </div>
            <ul id="report-list" class="divide-y divide-slate-100"></ul>
        </div>
    </div>

    <!-- Editor -->
    <div id="editor-view" class="max-w-5xl mx-auto p-3 sm:p-6 hidden print:p-0 print:max-w-none print:block">
        
        <div class="no-print flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 sm:mb-6 bg-white p-3 sm:p-4 rounded-xl shadow-sm border border-slate-200 sticky top-0 z-50 gap-3">
            <div class="flex justify-between w-full sm:w-auto items-center">
                <button onclick="app.showDashboard()" class="text-slate-600 hover:text-slate-900 flex items-center gap-2 font-medium">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <button onclick="app.togglePreview()" class="bg-amber-50 hover:bg-amber-100 text-amber-700 px-3 py-2 rounded-lg font-medium flex-1 sm:flex-none flex items-center justify-center gap-2">
                    <i class="fa-solid fa-eye"></i> Preview
                </button>
                <button onclick="app.saveReport()" class="bg-slate-100 hover:bg-slate-200 text-slate-800 px-3 py-2 rounded-lg font-medium flex-1 sm:flex-none flex items-center justify-center gap-2">
                    <i class="fa-solid fa-save"></i> Save
                </button>
                <button onclick="window.print()" class="bg-amber-600 hover:bg-amber-700 text-white px-3 py-2 rounded-lg font-medium flex-1 sm:flex-none flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-pdf"></i> Export PDF
                </button>
            </div>
        </div>

        <!-- Score Summary Header -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 print:mb-2 print:p-2">
            <div>
                <h2 class="text-xl font-bold text-slate-900 print:text-base">Audit Summary</h2>
                <p class="text-sm text-slate-500 print:hidden">Real-time performance metrics</p>
            </div>
            <div id="score-card" class="flex gap-4 items-center">
                <div class="text-center">
                    <div id="score-percent" class="text-3xl font-black text-amber-600 print:text-xl">0%</div>
                    <div class="text-[10px] uppercase font-bold text-slate-400">Total Score</div>
                </div>
                <div class="h-10 w-px bg-slate-100 print:h-6"></div>
                <div class="flex gap-3 text-center">
                    <div>
                        <div id="count-compliant" class="text-lg font-bold text-emerald-600 print:text-sm">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400">Yes</div>
                    </div>
                    <div>
                        <div id="count-non" class="text-lg font-bold text-red-500 print:text-sm">0</div>
                        <div class="text-[10px] uppercase font-bold text-slate-400">No</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Metadata -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mb-6 print:p-4 print:mb-2">
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 sm:gap-6 print:gap-2">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Date</label>
                    <input type="date" id="meta-date" class="w-full border-b-2 border-slate-200 py-1 focus:outline-none focus:border-amber-600 bg-transparent text-sm" onchange="app.updateMeta('date', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Time</label>
                    <input type="time" id="meta-time" class="w-full border-b-2 border-slate-200 py-1 focus:outline-none focus:border-amber-600 bg-transparent text-sm" onchange="app.updateMeta('time', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Auditor</label>
                    <input type="text" id="meta-auditorName" class="w-full border-b-2 border-slate-200 py-1 focus:outline-none focus:border-amber-600 bg-transparent text-sm" onchange="app.updateMeta('auditorName', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Guest Name</label>
                    <input type="text" id="meta-guestName" class="w-full border-b-2 border-slate-200 py-1 focus:outline-none focus:border-amber-600 bg-transparent text-sm" onchange="app.updateMeta('guestName', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Table No</label>
                    <input type="text" id="meta-tableNo" class="w-full border-b-2 border-slate-200 py-1 focus:outline-none focus:border-amber-600 bg-transparent text-sm" onchange="app.updateMeta('tableNo', this.value)">
                </div>
            </div>
        </div>

        <!-- Checklist -->
        <div id="checklist-container" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6 divide-y divide-slate-100">
            <!-- Questions injected via JS -->
        </div>

        <!-- Observations -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mb-6 print:p-4 avoid-break">
            <div class="flex justify-between items-center mb-3">
                <label class="block text-lg font-bold text-slate-900">Audit Observation</label>
                <button onclick="app.triggerGeneralPhotoUpload()" class="no-print bg-slate-100 hover:bg-slate-200 text-slate-700 py-1.5 px-3 rounded text-sm font-medium border border-slate-200">
                    <i class="fa-solid fa-camera mr-1"></i> Attach Photos
                </button>
            </div>
            <textarea id="meta-observation" rows="4" class="w-full border border-slate-200 rounded-lg p-3 focus:ring-2 focus:ring-amber-600 outline-none print:hidden" onchange="app.updateMeta('observation', this.value)"></textarea>
            <div id="print-meta-observation" class="hidden print:block text-xs whitespace-pre-wrap"></div>
            <div id="general-photos-container" class="mt-4 flex gap-3 overflow-x-auto pb-2 hide-scrollbar print:flex-wrap"></div>
        </div>

        <input type="file" id="item-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleItemPhotoUpload(event)">
        <input type="file" id="general-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleGeneralPhotoUpload(event)">
    </div>

    <script>
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        const AUDIT_QUESTIONS = [
            "[Spring B'Fast] Are all team members groomed as per standard?",
            "[Spring B'Fast] Welcome (Namaste, Smile, Eye contact, Tone of voice, Body Language).",
            "[Spring B'Fast] Did the the hostess enquire the guest details (Name & Room Number) at the hostess desk?",
            "[Spring B'Fast] Did the hostess escort the guest to the preferred table?",
            "[Spring B'Fast] Assisting the guest to sit by pulling the chair & inform about table number.",
            "[Spring B'Fast] Was hot beverages( Tea& Coffee) checked and served as per guest preference.",
            "[Spring B'Fast] Did the team member explain about S.No ?",
            "[Spring B'Fast] Did the team member explain about live station and how to order?",
            "[Spring B'Fast] Did the team member explain about the waiter calling system on table for any requirement?",
            "[Spring B'Fast] Was bottled filled with water on the table?",
            "[Spring B'Fast] Did the team member helped the guest with getting food on the table on request?",
            "[Spring B'Fast] Did the team member did the clearance on time?",
            "[Spring B'Fast] Did the team member re-fill the coffee and tea on time?",
            "[Spring B'Fast] Did the team member check for the guest feedback?",
            "[Spring B'Fast] Body Language during the service?",
            "[Spring B'Fast] Did the team follow sequence of service all time?",
            "[Spring B'Fast] Was the team member attentive all the time?",
            "[Spring B'Fast] Was bot shot feedback was given to guest?",
            "[Spring B'Fast] Was fond farewell given to guest?",
            "[Spring B'Fast] Was buffet closed board placed @10.30hrs or 11.00hrs?",
            "[Spring B'Fast] Were pesto fly switched on, clean, and in working condition?",
            "[Maintenance] Flooring: Ensure all floor surfaces are pristine and show no signs of staining or structural damage.",
            "[Maintenance] Seating: Confirm that all chairs are maintained in excellent condition, free from upholstery stains or wear.",
            "[Maintenance] Upholstery Detail: Verify that the crevices and sides of the sofas are thoroughly cleared of any debris or food particles.",
            "[Maintenance] Display Areas: Ensure the pigeonhole shelving and glass artifacts are meticulously dusted and polished.",
            "[Maintenance] Wall Surfaces: Check that walls are unmarked, showing no scuffs, stains, or physical indentations.",
            "[Maintenance] Tabletops: Maintain all tabletops in a high-polish state; please document the most recent polishing date."
        ];

        const app = {
            reports: [],
            currentReportId: null,
            
            init() {
                const stored = localStorage.getItem('hotelSpringBFastAuditsV1');
                if (stored) {
                    try {
                        this.reports = JSON.parse(stored).filter(r => r.meta.date !== '2026-03-06');
                    } catch (e) { console.error(e); }
                }
                this.renderDashboard();
            },

            saveToLocal() {
                localStorage.setItem('hotelSpringBFastAuditsV1', JSON.stringify(this.reports));
            },

            showDashboard() {
                document.body.classList.remove('preview-mode');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('editor-view').classList.add('hidden');
                this.renderDashboard();
            },

            createNewReport() {
                const newReport = {
                    id: Date.now().toString(),
                    meta: { date: new Date().toISOString().split('T')[0], time: '', auditorName: '', observation: '' },
                    generalPhotos: [],
                    items: {}
                };
                AUDIT_QUESTIONS.forEach((q, idx) => {
                    newReport.items[idx] = { status: null, remarks: '', photos: [] };
                });
                this.reports.unshift(newReport);
                this.currentReportId = newReport.id;
                this.saveToLocal();
                this.renderEditor();
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            openReport(id) {
                this.currentReportId = id;
                this.renderEditor();
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            getCurrentReport() {
                return this.reports.find(r => r.id === this.currentReportId);
            },

            updateMeta(field, value) {
                const report = this.getCurrentReport();
                if (report) {
                    report.meta[field] = value;
                    if (field === 'observation') document.getElementById('print-meta-observation').textContent = value;
                    this.saveToLocal();
                }
            },

            updateItemStatus(index, status) {
                const report = this.getCurrentReport();
                if (report) {
                    report.items[index].status = (report.items[index].status === status) ? null : status;
                    this.saveToLocal();
                    this.renderChecklist();
                    this.calculateScore();
                }
            },

            calculateScore() {
                const report = this.getCurrentReport();
                if (!report) return;
                
                let compliant = 0;
                let nonCompliant = 0;
                let evaluable = 0;

                Object.values(report.items).forEach(item => {
                    if (item.status === 'compliant') {
                        compliant++;
                        evaluable++;
                    } else if (item.status === 'non-compliant') {
                        nonCompliant++;
                        evaluable++;
                    }
                });

                const score = evaluable > 0 ? Math.round((compliant / evaluable) * 100) : 0;
                
                document.getElementById('score-percent').textContent = score + '%';
                document.getElementById('count-compliant').textContent = compliant;
                document.getElementById('count-non').textContent = nonCompliant;
            },

            compressImage(file, callback) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX = 300;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX/h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        callback(canvas.toDataURL('image/jpeg', 0.3));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

            triggerPhotoUpload(index) {
                this.currentUploadIndex = index;
                document.getElementById('item-photo-upload').click();
            },

            handleItemPhotoUpload(event) {
                const files = event.target.files;
                const report = this.getCurrentReport();
                Array.from(files).forEach(file => {
                    this.compressImage(file, base64 => {
                        report.items[this.currentUploadIndex].photos.push(base64);
                        this.saveToLocal();
                        this.renderChecklist();
                    });
                });
            },

            triggerGeneralPhotoUpload() {
                document.getElementById('general-photo-upload').click();
            },

            handleGeneralPhotoUpload(event) {
                const files = event.target.files;
                const report = this.getCurrentReport();
                Array.from(files).forEach(file => {
                    this.compressImage(file, base64 => {
                        report.generalPhotos.push(base64);
                        this.saveToLocal();
                        this.renderGeneralPhotos();
                    });
                });
            },

            renderDashboard() {
                const list = document.getElementById('report-list');
                const empty = document.getElementById('empty-state');
                list.innerHTML = '';
                if (this.reports.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }
                empty.classList.add('hidden');
                this.reports.forEach(r => {
                    const li = document.createElement('li');
                    li.className = "p-4 hover:bg-slate-50 cursor-pointer flex justify-between items-center group";
                    li.onclick = () => this.openReport(r.id);
                    li.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="bg-amber-100 p-3 rounded-lg text-amber-600"><i class="fa-solid fa-mug-hot"></i></div>
                            <div>
                                <h3 class="font-bold text-slate-900">${escapeHTML(r.meta.auditorName || 'New Audit')}</h3>
                                <div class="text-xs text-slate-500">${r.meta.date} • ${r.meta.tableNo || 'No Table'}</div>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300"></i>
                    `;
                    list.appendChild(li);
                });
            },

            renderEditor() {
                const report = this.getCurrentReport();
                if (!report) return;
                Object.keys(report.meta).forEach(key => {
                    const el = document.getElementById('meta-' + key);
                    if (el) el.value = report.meta[key];
                });
                this.renderChecklist();
                this.renderGeneralPhotos();
                this.calculateScore();
            },

            renderChecklist() {
                const report = this.getCurrentReport();
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';
                let lastCat = '';

                AUDIT_QUESTIONS.forEach((q, idx) => {
                    const item = report.items[idx];
                    const cat = q.match(/^\[(.*?)\]/)[1];
                    const cleanQ = q.replace(/^\[(.*?)\]\s*/, '');

                    if (cat !== lastCat) {
                        const h = document.createElement('div');
                        h.className = "bg-slate-50 px-4 py-2 text-xs font-bold text-slate-500 uppercase tracking-widest border-y border-slate-100";
                        h.textContent = cat;
                        container.appendChild(h);
                        lastCat = cat;
                    }

                    const row = document.createElement('div');
                    row.className = "p-4 flex flex-col gap-3 avoid-break print:p-2";
                    row.innerHTML = `
                        <div class="flex flex-col sm:flex-row justify-between gap-4">
                            <div class="flex-1">
                                <span class="text-slate-400 text-xs font-bold mr-2">${idx + 1}.</span>
                                <span class="text-sm font-medium text-slate-800 print:text-[10px]">${cleanQ}</span>
                            </div>
                            <div class="flex gap-1 no-print">
                                <button onclick="app.updateItemStatus(${idx}, 'compliant')" class="status-btn px-3 py-1.5 border rounded-md text-xs font-bold transition-all ${item.status === 'compliant' ? 'selected-compliant' : 'text-slate-400 border-slate-200'}">YES</button>
                                <button onclick="app.updateItemStatus(${idx}, 'non-compliant')" class="status-btn px-3 py-1.5 border rounded-md text-xs font-bold transition-all ${item.status === 'non-compliant' ? 'selected-non-compliant' : 'text-slate-400 border-slate-200'}">NO</button>
                                <button onclick="app.updateItemStatus(${idx}, 'na')" class="status-btn px-3 py-1.5 border rounded-md text-xs font-bold transition-all ${item.status === 'na' ? 'selected-na' : 'text-slate-400 border-slate-200'}">N/A</button>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input type="text" placeholder="Remarks..." value="${escapeHTML(item.remarks)}" onchange="app.updateItemRemarks(${idx}, this.value)" class="flex-1 text-xs border border-slate-100 rounded p-1.5 outline-none focus:border-amber-400 print:border-none print:p-0">
                            <button onclick="app.triggerPhotoUpload(${idx})" class="no-print text-[10px] font-bold text-slate-400 hover:text-amber-600 transition-colors"><i class="fa-solid fa-camera mr-1"></i>Evidence (${item.photos.length})</button>
                        </div>
                        <div class="flex gap-2 overflow-x-auto">
                            ${item.photos.map(p => `<img src="${p}" class="w-12 h-12 rounded object-cover border border-slate-100">`).join('')}
                        </div>
                    `;
                    container.appendChild(row);
                });
            },

            updateItemRemarks(idx, val) {
                const r = this.getCurrentReport();
                r.items[idx].remarks = val;
                this.saveToLocal();
            },

            renderGeneralPhotos() {
                const r = this.getCurrentReport();
                const container = document.getElementById('general-photos-container');
                container.innerHTML = r.generalPhotos.map(p => `<img src="${p}" class="w-20 h-20 rounded-lg object-cover shadow-sm">`).join('');
            },

            togglePreview() {
                document.body.classList.toggle('preview-mode');
                window.scrollTo(0,0);
            },

            saveReport() {
                this.saveToLocal();
                alert("Audit saved successfully.");
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
