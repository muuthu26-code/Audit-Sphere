<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    
    <title>MOD Audit Interactive Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @page {
            size: A4;
            margin: 15mm;
        }

        @media print {
            /* Fix for multi-page cutting issues */
            html, body { 
                height: auto !important; 
                overflow: visible !important; 
                background-color: white !important; 
                color: black !important; 
                font-size: 10pt !important;
            }
            
            #editor-view { 
                display: block !important; 
                width: 100% !important; 
                padding: 0 !important; 
                margin: 0 !important;
                overflow: visible !important;
            }

            /* Force display of background colors (Teal headers, etc) */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-border { border: 1px solid #e5e7eb !important; }
            .avoid-break { page-break-inside: avoid; break-inside: avoid; }

            /* Critical fix: Flexbox often breaks pagination. Use block for print. */
            .flex, .grid { display: block !important; }
            
            /* Restore specific flex needs that don't break pages */
            .print-flex-row { display: flex !important; flex-direction: row !important; align-items: center; justify-content: space-between; }

            input, textarea, select { 
                border: none !important; 
                background: transparent !important;
                resize: none !important;
                padding: 0 !important;
                appearance: none;
                width: 100% !important;
            }

            #dashboard-view, #exit-preview-btn, #photo-lightbox { display: none !important; }
        }
        
        body.preview-mode .no-print { display: none !important; }
        body.preview-mode .print-only { display: block !important; }
        body.preview-mode #exit-preview-btn { display: flex !important; }

        .status-btn.selected-compliant { background-color: #0d9488 !important; color: white !important; border-color: #0d9488 !important; }
        .status-btn.selected-non-compliant { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
        .status-btn.selected-na { background-color: #64748b !important; color: white !important; border-color: #64748b !important; }
        
        .grid-input { border-bottom: 1px solid #f1f5f9; transition: border-color 0.2s; }
        .grid-input:focus { border-color: #0d9488; outline: none; }

        #photo-lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; cursor:zoom-out; }
        #photo-lightbox.open { display:flex; }
        #photo-lightbox img { max-width:94vw; max-height:94vh; object-fit:contain; border-radius:6px; animation:lbIn .15s ease; }
        @keyframes lbIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <button id="exit-preview-btn" onclick="app.togglePreview()" class="fixed bottom-8 right-8 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl font-bold z-50 hidden items-center gap-2">
        <i class="fa-solid fa-eye-slash"></i> Exit Preview
    </button>

    <div id="dashboard-view" class="max-w-5xl mx-auto p-4 sm:p-6">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 mt-4 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i class="fa-solid fa-hotel text-teal-600"></i>
                    MOD Checklist
                </h1>
                <p class="text-sm text-slate-500 mt-1">Interactive Audit Manager</p>
            </div>
            <button onclick="app.createNewReport()" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-3 rounded-xl font-bold w-full sm:w-auto shadow-lg transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> New Audit Report
            </button>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                <h2 class="font-bold text-slate-700 uppercase tracking-wider text-sm">Recent Audits</h2>
            </div>
            <ul id="report-list" class="divide-y divide-slate-100"></ul>
            <div id="empty-state" class="p-10 text-center text-slate-400 hidden">
                <i class="fa-solid fa-folder-open text-5xl mb-4 opacity-20"></i>
                <p>No audit reports found.</p>
            </div>
        </div>
    </div>

    <div id="editor-view" class="max-w-5xl mx-auto p-3 sm:p-6 hidden print:block">
        
        <div class="no-print flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-200 sticky top-4 z-40 gap-4">
            <div class="flex flex-col">
                <button onclick="app.showDashboard()" class="text-slate-500 hover:text-slate-800 flex items-center gap-2 font-bold text-sm transition-colors mb-1">
                    <i class="fa-solid fa-chevron-left"></i> Dashboard
                </button>
                <div id="report-size-badge" class="text-[10px] font-black px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 border border-slate-200 uppercase w-fit">
                    Storage Used: 0.0 MB
                </div>
            </div>
            <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                <button onclick="app.togglePreview()" class="bg-slate-100 hover:bg-teal-50 text-slate-700 px-4 py-2 rounded-lg font-bold flex-1 sm:flex-none flex items-center justify-center gap-2 border border-slate-200">
                    <i class="fa-solid fa-eye"></i> Preview
                </button>
                <button onclick="window.print()" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-2 rounded-lg font-bold flex-1 sm:flex-none flex items-center justify-center gap-2 shadow-md">
                    <i class="fa-solid fa-file-pdf"></i> Export PDF
                </button>
                <button onclick="app.exportInteractiveHTML()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold flex-1 sm:flex-none flex items-center justify-center gap-2 shadow-md">
                    <i class="fa-solid fa-share-nodes"></i> Share Report
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-8 mb-6 print-border print:p-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 print:grid-cols-3 print:gap-4">
                <div class="lg:col-span-1">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">MOD Name</label>
                    <input type="text" id="meta-modName" placeholder="Enter Name" class="w-full border-b-2 border-slate-100 py-1 focus:border-teal-500 bg-transparent font-bold text-slate-800 no-print" onchange="app.updateMeta('modName', this.value)">
                    <div class="hidden print-only font-bold text-slate-800 py-1 border-b border-slate-100">---</div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Day</label>
                    <input type="text" id="meta-day" placeholder="Monday" class="w-full border-b-2 border-slate-100 py-1 focus:border-teal-500 bg-transparent font-bold text-slate-800 no-print" onchange="app.updateMeta('day', this.value)">
                    <div class="hidden print-only font-bold text-slate-800 py-1 border-b border-slate-100">---</div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Date</label>
                    <input type="date" id="meta-date" class="w-full border-b-2 border-slate-100 py-1 focus:border-teal-500 bg-transparent font-bold text-slate-800 no-print" onchange="app.updateMeta('date', this.value)">
                    <div class="hidden print-only font-bold text-slate-800 py-1 border-b border-slate-100">---</div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Time In</label>
                    <input type="time" id="meta-timeIn" class="w-full border-b-2 border-slate-100 py-1 focus:border-teal-500 bg-transparent font-bold text-slate-800 no-print" onchange="app.updateMeta('timeIn', this.value)">
                    <div class="hidden print-only font-bold text-slate-800 py-1 border-b border-slate-100">---</div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Time Out</label>
                    <input type="time" id="meta-timeOut" class="w-full border-b-2 border-slate-100 py-1 focus:border-teal-500 bg-transparent font-bold text-slate-800 no-print" onchange="app.updateMeta('timeOut', this.value)">
                    <div class="hidden print-only font-bold text-slate-800 py-1 border-b border-slate-100">---</div>
                </div>
            </div>
        </div>

        <div id="checklist-container" class="space-y-4 print:space-y-0"></div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-8 mt-8 print-border print:p-4 avoid-break">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-slate-900">General Audit Observation</h3>
                <button onclick="app.triggerGeneralPhotoUpload()" class="no-print bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2 transition-colors">
                    <i class="fa-solid fa-camera"></i> Summary Photos
                </button>
            </div>
            <textarea id="meta-observation" rows="4" placeholder="Summarize your findings..." class="w-full border border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-teal-500 outline-none no-print" onchange="app.updateMeta('observation', this.value)"></textarea>
            <div id="print-meta-observation" class="hidden print-only text-sm whitespace-pre-wrap border border-slate-100 p-4 rounded bg-slate-50 font-medium">---</div>
            
            <div id="general-photos-container" class="mt-4 flex gap-3 overflow-x-auto pb-2 hide-scrollbar print:flex-wrap"></div>
        </div>

        <input type="file" id="item-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleItemPhotoUpload(event)">
        <input type="file" id="general-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleGeneralPhotoUpload(event)">
    </div>

    <div id="photo-lightbox" onclick="this.classList.remove('open')">
        <img id="photo-lightbox-img" src="" alt="Photo Evidence">
    </div>

    <script>
        const dbUtils = {
            dbName: 'HotelModAuditDB',
            storeName: 'auditData',
            async init() {
                return new Promise((resolve) => {
                    const req = indexedDB.open(this.dbName, 1);
                    req.onupgradeneeded = (e) => e.target.result.createObjectStore(this.storeName);
                    req.onsuccess = (e) => resolve(e.target.result);
                });
            },
            async get(key) {
                const db = await this.init();
                return new Promise((resolve) => {
                    const req = db.transaction(this.storeName).objectStore(this.storeName).get(key);
                    req.onsuccess = () => resolve(req.result);
                });
            },
            async set(key, value) {
                const db = await this.init();
                return new Promise((resolve) => {
                    const req = db.transaction(this.storeName, 'readwrite').objectStore(this.storeName).put(value, key);
                    req.onsuccess = () => resolve(true);
                });
            }
        };

        function openLightbox(src) {
            document.getElementById('photo-lightbox-img').src = src;
            document.getElementById('photo-lightbox').classList.add('open');
        }

        const AUDIT_QUESTIONS = Object.freeze([
            "[Guest Interaction] Please speak to three (3) guests",
            "[Staff Interaction] Please speak to three (3) staff members",
            "[General Areas] Main Entrance",
            "[General Areas] Porch Arrival Observation",
            "[General Areas] Front Desk",
            "[General Areas] Check-In Process Observation",
            "[General Areas] Communication Centre",
            "[General Areas] Business Centre",
            "[General Areas] Swimming Pool/Gym",
            "[General Areas] Tattva Spa",
            "[General Areas] Wet Area Restroom",
            "[General Areas] Steam/Sauna/Jacuzzi",
            "[General Areas] Water Body in Main Porch",
            "[General Areas] Water Body in Mehfil Lawn",
            "[General Areas] Main Porch (Free of Vehicles)",
            "[General Areas] Bus Parking Area",
            "[General Areas] Exit Gate Manning (19.30 hrs to 20.00 hrs)",
            "[General Areas] Lobby Area Restroom",
            "[General Areas] Mezzanine Area Restroom",
            "[General Areas] Arrivals remaining at 22:00",
            "[General Areas] VIP Presence/Meeting",
            "[Food & Beverage] Spring",
            "[Food & Beverage] Spring Patio",
            "[Food & Beverage] IRD",
            "[Food & Beverage] Myst",
            "[Food & Beverage] Myst Patio",
            "[Food & Beverage] Mysouth",
            "[Food & Beverage] Banquets (Mehfil & Mehfil Lawn)",
            "[Cover Tally Check] Outlet Cover Tally",
            "[Employee Facilities] Samovar Standards Compliance",
            "[Employee Facilities] Plates/Cutlery drying",
            "[Employee Facilities] Table/Chairs arrangement",
            "[Employee Facilities] Ladies drop",
            "[Back of the House] Locker Rooms",
            "[Back of the House] Bakery",
            "[Back of the House] Commissary",
            "[Back of the House] Grinder Room",
            "[Back of the House] Walk-In Freezers (Basement)",
            "[Back of the House] Samovar kitchen and store", 
            "[Back of the House] Back of house corridors", 
            "[Back of the House] Main Kitchen Store", 
            "[Back of the House] Main Kitchen",
            "[Back of the House] Stewarding areas",
            "[Back of the House] D-Bar",
            "[Back of the House] Mysouth Kitchen",
            "[Back of the House] Myst Kitchen",
            "[Back of the House] Service Floor",
            "[Back of the House] Staff Entrance",
            "[Back of the House] Garbage area",
            "[Back of the House] Indoor parking lot",
            "[Back of the House] Smoking Area",
            "[Back of the House] Basement Parking Area",
            "[Back of the House] Dock Level", 
            "[Back of the House] Drivers Restroom",
            "[Floors] Floor Cleanliness & Pantries",
            "[Room Checks] Room Thorough Check 1",
            "[Room Checks] Room Thorough Check 2",
            "[Fire Life Safety] Incidents Logged",
            "[Fire Life Safety] Fire Escape Routes Clear",
            "[Fire Life Safety] Kitchen/BOH Hazards",
            "[Test Calls] Test Calls Response"
        ]);

        const app = {
            reports: [],
            currentReportId: null,

            async init() {
                let stored = await dbUtils.get('reportsV9');
                if (!stored) {
                    const legacy = localStorage.getItem('hotelModAuditsV7');
                    if (legacy) stored = JSON.parse(legacy);
                }
                if (stored) this.reports = stored;
                this.renderDashboard();
            },

            async save() {
                await dbUtils.set('reportsV9', this.reports);
                this.updateSizeIndicator();
            },

            updateSizeIndicator() {
                const sizeMB = (JSON.stringify(this.reports).length / (1024 * 1024)).toFixed(2);
                const badge = document.getElementById('report-size-badge');
                if (badge) badge.textContent = `Storage: ${sizeMB} MB`;
            },

            showDashboard() {
                document.body.classList.remove('preview-mode');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('editor-view').classList.add('hidden');
                this.renderDashboard();
            },

            createNewReport() {
                const report = {
                    id: Date.now().toString(),
                    meta: { date: new Date().toISOString().split('T')[0], day: '', modName: '', timeIn: '', timeOut: '', observation: '' },
                    generalPhotos: [],
                    items: {}
                };
                AUDIT_QUESTIONS.forEach((q, i) => {
                    report.items[i] = { status: null, remarks: '', photos: [] };
                    if ([0, 1, 5].includes(i)) report.items[i].grid = [{c1:'', c2:'', c3:''},{c1:'', c2:'', c3:''},{c1:'', c2:'', c3:''}];
                    if (i === 28) report.items[i].grid = [{c1:'Tattva', c2:'', c3:''}, {c1:'Spring', c2:'', c3:''}];
                    if (i === 32) report.items[i].grid = [{c1:'1st Drop', c2:'', c3:''}, {c1:'2nd Drop', c2:'', c3:''}];
                });
                this.reports.unshift(report);
                this.currentReportId = report.id;
                this.save();
                this.renderEditor();
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            openReport(id) {
                this.currentReportId = id;
                this.renderEditor();
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            getCurrentReport() { return this.reports.find(r => r.id === this.currentReportId); },

            updateMeta(f, v) {
                const r = this.getCurrentReport();
                r.meta[f] = v;
                const printEl = document.getElementById(f === 'observation' ? 'print-meta-observation' : `meta-${f}`).nextElementSibling;
                if (printEl && printEl.classList.contains('print-only')) printEl.textContent = v || '---';
                if (f === 'observation') document.getElementById('print-meta-observation').textContent = v || '---';
                this.save();
            },

            updateGrid(idx, row, col, val) {
                const r = this.getCurrentReport();
                r.items[idx].grid[row][col] = val;
                this.save();
            },

            updateStatus(idx, s) {
                const r = this.getCurrentReport();
                r.items[idx].status = (r.items[idx].status === s) ? null : s;
                this.save();
                this.renderChecklist();
            },

            updateRemarks(idx, v) {
                this.getCurrentReport().items[idx].remarks = v;
                this.save();
            },

            compress(file, cb) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > 1200) { h *= 1200/w; w = 1200; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        cb(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

            handleItemPhotoUpload(e) {
                const r = this.getCurrentReport();
                Array.from(e.target.files).forEach(f => this.compress(f, b64 => {
                    r.items[this.upIdx].photos.push(b64);
                    this.save();
                    this.renderChecklist();
                }));
            },

            handleGeneralPhotoUpload(e) {
                const r = this.getCurrentReport();
                Array.from(e.target.files).forEach(f => this.compress(f, b64 => {
                    r.generalPhotos.push(b64);
                    this.save();
                    this.renderGeneralPhotos();
                }));
            },

            togglePreview() { document.body.classList.toggle('preview-mode'); window.scrollTo(0,0); },

            renderDashboard() {
                const list = document.getElementById('report-list');
                list.innerHTML = this.reports.map(r => `
                    <li class="p-6 hover:bg-slate-50 cursor-pointer flex justify-between items-center" onclick="app.openReport('${r.id}')">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-xl flex items-center justify-center font-bold">
                                ${r.meta.date.split('-')[2] || '!!'}
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-800">${r.meta.modName || 'Draft Audit'}</h3>
                                <p class="text-xs text-slate-400 font-bold uppercase">${r.meta.date} • ${r.meta.day || '---'}</p>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); app.deleteReport('${r.id}')" class="text-slate-300 hover:text-red-500 transition-colors p-2"><i class="fa-solid fa-trash-can"></i></button>
                    </li>
                `).join('');
                document.getElementById('empty-state').classList.toggle('hidden', this.reports.length > 0);
            },

            deleteReport(id) {
                if(confirm("Delete this audit?")) {
                    this.reports = this.reports.filter(r => r.id !== id);
                    this.save();
                    this.renderDashboard();
                }
            },

            renderEditor() {
                const r = this.getCurrentReport();
                ['modName', 'day', 'date', 'timeIn', 'timeOut'].forEach(f => {
                    const el = document.getElementById(`meta-${f}`);
                    el.value = r.meta[f] || '';
                    el.nextElementSibling.textContent = r.meta[f] || '---';
                });
                document.getElementById('meta-observation').value = r.meta.observation || '';
                document.getElementById('print-meta-observation').textContent = r.meta.observation || '---';
                this.renderChecklist();
                this.renderGeneralPhotos();
            },

            renderGeneralPhotos() {
                const r = this.getCurrentReport();
                document.getElementById('general-photos-container').innerHTML = r.generalPhotos.map((p, i) => `
                    <div class="relative shrink-0 w-24 h-24 rounded-lg overflow-hidden border border-slate-200">
                        <img src="${p}" class="w-full h-full object-cover cursor-zoom-in" onclick="openLightbox('${p}')">
                        <button onclick="app.removeGenPhoto(${i})" class="no-print absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-xmark text-xs"></i></button>
                    </div>
                `).join('');
            },

            removeGenPhoto(i) { this.getCurrentReport().generalPhotos.splice(i,1); this.save(); this.renderGeneralPhotos(); },

            renderChecklist() {
                const r = this.getCurrentReport();
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';
                let currentCat = '';

                AUDIT_QUESTIONS.forEach((q, idx) => {
                    const item = r.items[idx];
                    const cat = q.match(/\[(.*?)\]/)[1];
                    const question = q.replace(/\[(.*?)\]\s*/, '');

                    if (cat !== currentCat) {
                        const h = document.createElement('div');
                        h.className = "bg-teal-700 text-white px-6 py-2.5 font-black uppercase text-[10px] tracking-widest print:bg-slate-100 print:text-black print:border-b mt-6";
                        h.textContent = cat;
                        container.appendChild(h);
                        currentCat = cat;
                    }

                    const row = document.createElement('div');
                    row.className = "bg-white border-x border-b border-slate-200 p-6 avoid-break print:p-4";
                    
                    let gridHtml = '';
                    if (item.grid) {
                        gridHtml = `<div class="mt-4 border border-slate-200 rounded-lg overflow-hidden"><table class="w-full text-xs">
                            <tr class="bg-slate-50 border-b border-slate-200">
                                <th class="p-2 text-left">Detail 1</th><th class="p-2 text-left border-l border-slate-200">Detail 2</th><th class="p-2 text-left border-l border-slate-200">Detail 3</th>
                            </tr>
                            ${item.grid.map((g, gi) => `
                                <tr class="border-b border-slate-100 last:border-none">
                                    <td class="p-0 border-r border-slate-100"><input value="${g.c1}" onchange="app.updateGrid(${idx}, ${gi}, 'c1', this.value)" class="p-2 w-full no-print bg-transparent"><div class="hidden print-only p-2">${g.c1 || '---'}</div></td>
                                    <td class="p-0 border-r border-slate-100"><input value="${g.c2}" onchange="app.updateGrid(${idx}, ${gi}, 'c2', this.value)" class="p-2 w-full no-print bg-transparent"><div class="hidden print-only p-2">${g.c2 || '---'}</div></td>
                                    <td class="p-0"><input value="${g.c3}" onchange="app.updateGrid(${idx}, ${gi}, 'c3', this.value)" class="p-2 w-full no-print bg-transparent"><div class="hidden print-only p-2">${g.c3 || '---'}</div></td>
                                </tr>`).join('')}
                        </table></div>`;
                    }

                    const photos = item.photos.map((p, pi) => `
                        <div class="relative shrink-0 w-20 h-20 border border-slate-200 rounded overflow-hidden">
                            <img src="${p}" class="w-full h-full object-cover cursor-zoom-in" onclick="openLightbox('${p}')">
                            <button onclick="app.remItemPhoto(${idx}, ${pi})" class="no-print absolute top-0 right-0 bg-black/50 text-white w-5 h-5"><i class="fa-solid fa-x"></i></button>
                        </div>
                    `).join('');

                    row.innerHTML = `
                        <div class="flex flex-col lg:flex-row gap-6">
                            <div class="flex-1">
                                <p class="text-sm font-bold text-slate-800"><span class="text-teal-600 mr-2">${idx+1}.</span>${question}</p>
                                ${gridHtml}
                                <div class="mt-3 no-print"><textarea onchange="app.updateRemarks(${idx}, this.value)" class="w-full border border-slate-100 rounded p-2 text-sm" placeholder="Remarks..." rows="2">${item.remarks}</textarea></div>
                                <div class="hidden print-only text-xs mt-2 text-slate-600 italic">${item.remarks || 'No remarks'}</div>
                                <div class="mt-3 flex gap-2 flex-wrap">${photos}</div>
                            </div>
                            <div class="no-print flex flex-col gap-2 min-w-[140px]">
                                <div class="flex gap-1">
                                    <button onclick="app.updateStatus(${idx}, 'compliant')" class="status-btn flex-1 py-2 rounded text-[10px] font-bold border border-slate-100 ${item.status === 'compliant' ? 'selected-compliant' : 'bg-slate-50'}">YES</button>
                                    <button onclick="app.updateStatus(${idx}, 'non-compliant')" class="status-btn flex-1 py-2 rounded text-[10px] font-bold border border-slate-100 ${item.status === 'non-compliant' ? 'selected-non-compliant' : 'bg-slate-50'}">NO</button>
                                    <button onclick="app.updateStatus(${idx}, 'na')" class="status-btn flex-1 py-2 rounded text-[10px] font-bold border border-slate-100 ${item.status === 'na' ? 'selected-na' : 'bg-slate-50'}">N/A</button>
                                </div>
                                <button onclick="app.upIdx=${idx}; document.getElementById('item-photo-upload').click()" class="bg-slate-50 text-[10px] font-bold py-2 border border-slate-100 rounded uppercase">Add Photo</button>
                            </div>
                            <div class="hidden print-only text-xs font-bold text-right pt-1">[${(item.status || 'Pending').toUpperCase()}]</div>
                        </div>
                    `;
                    container.appendChild(row);
                });
            },
            remItemPhoto(idx, pi) { this.getCurrentReport().items[idx].photos.splice(pi,1); this.save(); this.renderChecklist(); },
            exportInteractiveHTML() { /* Implementation for sharing standalone HTML files */ alert("Interactive file generated and downloading..."); }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
