<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MOD Audit Checklist - High Res Evidence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Native App Feel */
        body {
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        button, input, textarea { touch-action: manipulation; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media print {
            body { background-color: white !important; color: black !important; font-size: 10px !important; line-height: 1.2 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-border { border: 1px solid #e5e7eb !important; }
            .avoid-break { page-break-inside: avoid; }
            
            /* PDF Specific Image Handling */
            .print\:w-24 { width: 6rem !important; }
            .print\:h-24 { height: 6rem !important; }
            
            input, textarea { 
                border: none !important; 
                background: transparent !important;
                resize: none !important;
                padding: 0 !important;
            }
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
            
            /* Make links look like normal text but remain clickable in digital PDF */
            a { text-decoration: none !important; color: inherit !important; }
        }
        
        body.preview-mode { background-color: white !important; color: black !important; }
        body.preview-mode .no-print { display: none !important; }
        body.preview-mode .print-only { display: block !important; }

        .status-btn.selected-compliant { background-color: #0d9488; color: white; border-color: #0d9488; }
        .status-btn.selected-non-compliant { background-color: #ef4444; color: white; border-color: #ef4444; }
        .status-btn.selected-na { background-color: #64748b; color: white; border-color: #64748b; }

        /* Image Zoom Modal (Web View Only) */
        #image-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #image-modal img {
            max-width: 98%;
            max-height: 98%;
            object-fit: contain;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- Image Modal for Web UI -->
    <div id="image-modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="Full size evidence">
        <div class="absolute bottom-6 text-white bg-black/50 px-4 py-2 rounded-full text-sm">Tap anywhere to close</div>
    </div>

    <!-- Exit Preview Floating Button -->
    <button id="exit-preview-btn" onclick="app.togglePreview()" class="fixed bottom-8 right-8 bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold z-50 transition-transform hover:scale-105 hidden items-center gap-2">
        <i class="fa-solid fa-eye-slash"></i> Exit Preview
    </button>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="max-w-5xl mx-auto p-4 sm:p-6 transition-opacity duration-300">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-10 mt-4 sm:mt-6 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i class="fa-solid fa-clipboard-user text-teal-600"></i>
                    MOD Audit Checklist
                </h1>
                <p class="text-sm sm:text-base text-slate-500 mt-1">File and export high-resolution Manager On Duty audits.</p>
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <button onclick="window.location.reload()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 transition-colors shadow-sm">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh
                </button>
                <button onclick="app.createNewReport()" class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 transition-colors shadow-sm">
                    <i class="fa-solid fa-plus"></i> New MOD Audit
                </button>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-200 bg-slate-50/50">
                <h2 class="text-lg font-semibold text-slate-800">Recent Reports</h2>
            </div>
            <div id="empty-state" class="p-12 text-center text-slate-500 flex flex-col items-center hidden">
                <i class="fa-solid fa-shield-halved text-5xl text-slate-300 mb-4"></i>
                <p class="text-lg">No audit reports filed yet.</p>
            </div>
            <ul id="report-list" class="divide-y divide-slate-100"></ul>
        </div>
    </div>

    <!-- Editor View -->
    <div id="editor-view" class="max-w-5xl mx-auto p-3 sm:p-6 hidden print:p-0 print:max-w-none print:block">
        
        <!-- Toolbar -->
        <div class="no-print flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 sm:mb-6 bg-white p-3 sm:p-4 rounded-xl shadow-sm border border-slate-200 sticky top-0 z-50 gap-3">
            <button onclick="app.showDashboard()" class="text-slate-600 hover:text-slate-900 flex items-center gap-2 font-medium">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <span id="save-status" class="hidden sm:inline text-sm text-slate-400 mr-2">Auto-saving...</span>
                <button onclick="app.togglePreview()" class="bg-teal-50 hover:bg-teal-100 text-teal-700 px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    <i class="fa-solid fa-eye"></i> Preview
                </button>
                <button onclick="window.print()" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    <i class="fa-solid fa-file-pdf"></i> Export PDF
                </button>
            </div>
        </div>

        <!-- Header Information -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mb-6 print:p-2 print:mb-1">
            <h2 class="text-xl sm:text-2xl font-bold text-slate-900 print:text-base mb-4 border-b pb-2">MOD Audit Report</h2>
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 print:gap-1">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 print:text-[8px]">Date</label>
                    <input type="date" id="meta-date" class="w-full border-b py-1 outline-none font-medium print:text-[10px]" onchange="app.updateMeta('date', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 print:text-[8px]">Day</label>
                    <input type="text" id="meta-day" placeholder="Monday" class="w-full border-b py-1 outline-none font-medium print:text-[10px]" onchange="app.updateMeta('day', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 print:text-[8px]">MOD Name</label>
                    <input type="text" id="meta-modName" placeholder="Name" class="w-full border-b py-1 outline-none font-medium print:text-[10px]" onchange="app.updateMeta('modName', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 print:text-[8px]">Time In</label>
                    <input type="time" id="meta-timeIn" class="w-full border-b py-1 outline-none font-medium print:text-[10px]" onchange="app.updateMeta('timeIn', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 print:text-[8px]">Time Out</label>
                    <input type="time" id="meta-timeOut" class="w-full border-b py-1 outline-none font-medium print:text-[10px]" onchange="app.updateMeta('timeOut', this.value)">
                </div>
            </div>
        </div>

        <!-- Questions List -->
        <div id="checklist-container" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden divide-y print:mb-2"></div>

        <!-- Summary -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mt-6 print:p-2 print:mt-1 avoid-break">
            <div class="flex justify-between items-center mb-4">
                <label class="block text-lg font-bold text-slate-900 print:text-base">Overall Observation</label>
                <button onclick="app.triggerGeneralPhotoUpload()" class="no-print bg-slate-100 px-3 py-1.5 rounded text-sm font-medium border">
                    <i class="fa-solid fa-camera mr-1"></i> Add Photos
                </button>
            </div>
            <textarea id="meta-observation" rows="4" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-teal-600 print:hidden" onchange="app.updateMeta('observation', this.value)"></textarea>
            <div id="print-meta-observation" class="hidden print:block whitespace-pre-wrap text-[10px] min-h-[40px]"></div>
            
            <div id="general-photos-container" class="mt-4 flex gap-3 flex-wrap"></div>
        </div>

        <input type="file" id="item-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleItemPhotoUpload(event)">
        <input type="file" id="general-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleGeneralPhotoUpload(event)">
    </div>

    <script>
        "use strict";

        const AUDIT_QUESTIONS = Object.freeze([
            "[Guest Interaction] Please speak to three (3) guests",
            "[Staff Interaction] Please speak to three (3) staff members",
            "[General Areas] Main Entrance",
            "[General Areas] Porch Arrival Standards",
            "[General Areas] Front Desk",
            "[General Areas] Check-In Process SOPs",
            "[General Areas] Communication Centre",
            "[General Areas] Business Centre",
            "[General Areas] Swimming Pool/Gym",
            "[General Areas] Tattva Spa",
            "[General Areas] Wet Area Restroom",
            "[General Areas] Steam/Sauna/Jacuzzi",
            "[General Areas] Water Body - Main Porch",
            "[General Areas] Water Body - Mehfil Lawn",
            "[General Areas] Main Porch (Vehicle Free)",
            "[General Areas] Bus Parking Area",
            "[General Areas] Exit Gate Manning",
            "[General Areas] Lobby Area Restroom",
            "[General Areas] Mezzanine Area Restroom",
            "[General Areas] Arrivals at 22:00",
            "[General Areas] VIP Expectations",
            "[Food & Beverage] Spring",
            "[Food & Beverage] Spring Patio",
            "[Food & Beverage] IRD",
            "[Food & Beverage] Myst",
            "[Food & Beverage] Myst Patio",
            "[Food & Beverage] Mysouth",
            "[Food & Beverage] Banquets",
            "[Cover Tally Check] Enter Cover Tally",
            "[Employee Facilities] Samovar Standards",
            "[Employee Facilities] Plates/Cutlery Cleanliness",
            "[Employee Facilities] Table/Chairs Arrangement",
            "[Employee Facilities] Ladies Drop",
            "[Back of the House] Locker Rooms",
            "[Back of the House] Bakery",
            "[Back of the House] Commissary",
            "[Back of the House] Grinder Room",
            "[Back of the House] Walk-In Freezers",
            "[Back of the House] Main Kitchen Store",
            "[Back of the House] Main Kitchen",
            "[Back of the House] D-Bar",
            "[Back of the House] Mysouth Kitchen Area",
            "[Back of the House] Myst Kitchen Area",
            "[Back of the House] Samovar Kitchen Area",
            "[Back of the House] Service Floor",
            "[Back of the House] BOH Corridors",
            "[Back of the House] Dock Level",
            "[Back of the House] Staff Entrance",
            "[Back of the House] Garbage Area",
            "[Back of the House] Stewarding Areas",
            "[Back of the House] Indoor Parking",
            "[Back of the House] Smoking Area",
            "[Back of the House] Basement Parking",
            "[Back of the House] Drivers Restroom",
            "[Floors] IRD Trays / Cleanliness",
            "[Room Checks] Check 2 rooms thoroughly",
            "[Fire Life Safety] Incidents Log",
            "[Fire Life Safety] Escape Routes Clear",
            "[Fire Life Safety] Dangerous Points BOH",
            "[Test Calls] Performance Testing"
        ]);

        const app = {
            reports: [],
            currentReportId: null,
            
            init() {
                try {
                    const stored = localStorage.getItem('hotelModAuditsV5');
                    if (stored) this.reports = JSON.parse(stored);
                } catch (e) { console.error(e); }
                this.renderDashboard();
            },

            saveToLocal() {
                localStorage.setItem('hotelModAuditsV5', JSON.stringify(this.reports));
                const s = document.getElementById('save-status');
                if(s) { s.textContent = "Saved locally"; setTimeout(() => s.textContent = "", 2000); }
            },

            showDashboard() {
                document.body.classList.remove('preview-mode');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('editor-view').classList.add('hidden');
                this.renderDashboard();
            },

            togglePreview() {
                document.body.classList.toggle('preview-mode');
                window.scrollTo(0, 0);
            },

            // Unified Photo Viewer (Web Interface)
            openImage(e, src) {
                // Prevent link from opening if we are in the web app
                if (e) e.preventDefault();
                const modal = document.getElementById('image-modal');
                const img = document.getElementById('modal-img');
                img.src = src;
                modal.style.display = 'flex';
            },

            createNewReport() {
                const newReport = {
                    id: Date.now().toString(),
                    meta: { date: new Date().toISOString().split('T')[0], day: '', modName: '', timeIn: '', timeOut: '', observation: '' },
                    generalPhotos: [],
                    items: {}
                };
                AUDIT_QUESTIONS.forEach((q, idx) => { newReport.items[idx] = { status: null, remarks: '', photos: [] }; });
                this.reports.unshift(newReport);
                this.currentReportId = newReport.id;
                this.saveToLocal();
                this.renderEditor();
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            openReport(id) {
                this.currentReportId = id;
                this.renderEditor();
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            updateMeta(field, value) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (r) {
                    r.meta[field] = value;
                    if (field === 'observation') document.getElementById('print-meta-observation').textContent = value;
                    this.saveToLocal();
                }
            },

            updateItemStatus(idx, status) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (r) {
                    r.items[idx].status = (r.items[idx].status === status) ? null : status;
                    this.saveToLocal();
                    this.renderChecklist();
                }
            },

            updateItemRemarks(idx, value) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (r) { r.items[idx].remarks = value; this.saveToLocal(); }
            },

            // High Fidelity Image Compression
            compressImage(file, callback) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 1200; // Crisp resolution for PDF
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        callback(canvas.toDataURL('image/jpeg', 0.8)); // High-fidelity 80% quality
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

            currentIdx: null,
            triggerPhotoUpload(idx) { this.currentIdx = idx; document.getElementById('item-photo-upload').click(); },
            handleItemPhotoUpload(e) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                Array.from(e.target.files).forEach(f => {
                    this.compressImage(f, (b64) => {
                        r.items[this.currentIdx].photos.push(b64);
                        this.saveToLocal();
                        this.renderChecklist();
                    });
                });
            },

            triggerGeneralPhotoUpload() { document.getElementById('general-photo-upload').click(); },
            handleGeneralPhotoUpload(e) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                Array.from(e.target.files).forEach(f => {
                    this.compressImage(f, (b64) => {
                        r.generalPhotos.push(b64);
                        this.saveToLocal();
                        this.renderGeneralPhotos();
                    });
                });
            },

            renderGeneralPhotos() {
                const r = this.reports.find(x => x.id === this.currentReportId);
                const c = document.getElementById('general-photos-container');
                c.innerHTML = r.generalPhotos.map((p, idx) => `
                    <div class="relative group w-32 h-32 border rounded overflow-hidden">
                        <a href="${p}" target="_blank" onclick="app.openImage(event, this.href)" class="block w-full h-full">
                            <img src="${p}" class="w-full h-full object-cover">
                        </a>
                        <button onclick="r.generalPhotos.splice(${idx},1); app.saveToLocal(); app.renderGeneralPhotos()" class="no-print absolute top-0 right-0 bg-red-500 text-white p-1 text-[10px]">Delete</button>
                    </div>
                `).join('');
            },

            renderDashboard() {
                const list = document.getElementById('report-list');
                const empty = document.getElementById('empty-state');
                list.innerHTML = '';
                if (!this.reports.length) { empty.classList.remove('hidden'); return; }
                empty.classList.add('hidden');
                this.reports.forEach(r => {
                    const li = document.createElement('li');
                    li.className = "p-4 hover:bg-slate-50 cursor-pointer flex justify-between items-center";
                    li.onclick = () => this.openReport(r.id);
                    li.innerHTML = `<div><div class="font-bold">${r.meta.modName || 'Unnamed Audit'}</div><div class="text-xs text-slate-500">${r.meta.date}</div></div><i class="fa-solid fa-chevron-right text-slate-300"></i>`;
                    list.appendChild(li);
                });
            },

            renderEditor() {
                const r = this.reports.find(x => x.id === this.currentReportId);
                document.getElementById('meta-date').value = r.meta.date;
                document.getElementById('meta-day').value = r.meta.day;
                document.getElementById('meta-modName').value = r.meta.modName;
                document.getElementById('meta-timeIn').value = r.meta.timeIn;
                document.getElementById('meta-timeOut').value = r.meta.timeOut;
                document.getElementById('meta-observation').value = r.meta.observation;
                document.getElementById('print-meta-observation').textContent = r.meta.observation;
                this.renderChecklist();
                this.renderGeneralPhotos();
            },

            renderChecklist() {
                const r = this.reports.find(x => x.id === this.currentReportId);
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';
                let currentCat = '';

                AUDIT_QUESTIONS.forEach((q, idx) => {
                    const item = r.items[idx];
                    const cat = q.match(/^\[(.*?)\]/)?.[1] || "Audit";
                    const cleanQ = q.replace(/^\[(.*?)\]\s*/, '');

                    if (cat !== currentCat) {
                        const h = document.createElement('div');
                        h.className = "bg-slate-50 px-4 py-2 font-bold text-teal-800 border-y text-sm print:bg-slate-100 print:text-black";
                        h.textContent = cat;
                        container.appendChild(h);
                        currentCat = cat;
                    }

                    const row = document.createElement('div');
                    row.className = "p-4 sm:p-5 flex flex-col md:flex-row gap-4 border-b last:border-0 print:p-2 print:gap-1 avoid-break";
                    
                    const photos = item.photos.length ? `
                        <div class="flex flex-wrap gap-2 mt-2">
                            ${item.photos.map((p, pIdx) => `
                                <div class="relative group w-24 h-24 border rounded overflow-hidden">
                                    <a href="${p}" target="_blank" onclick="app.openImage(event, this.href)" title="Tap to enlarge" class="block w-full h-full relative">
                                        <img src="${p}" class="w-full h-full object-cover">
                                        <!-- PDF/Print Tooltip Logic -->
                                        <div class="hidden print:block absolute bottom-0 left-0 right-0 bg-black/60 text-[6px] text-white text-center py-0.5">Tap to view high-res</div>
                                        <!-- Web Hover Tooltip -->
                                        <div class="no-print absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                            <i class="fa-solid fa-magnifying-glass-plus text-white text-xl"></i>
                                        </div>
                                    </a>
                                    <button onclick="item.photos.splice(${pIdx},1); app.saveToLocal(); app.renderChecklist();" class="no-print absolute top-0 right-0 bg-red-500 text-white w-4 h-4 flex items-center justify-center text-[8px] rounded-bl-lg shadow">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    ` : '';

                    row.innerHTML = `
                        <div class="flex-1">
                            <div class="flex gap-2">
                                <span class="text-slate-400 font-bold text-sm">${idx + 1}.</span>
                                <p class="font-medium text-slate-800 text-sm print:text-[10px]">${cleanQ}</p>
                            </div>
                            <div class="hidden print:block font-bold text-[8px] mt-1">Status: ${item.status || 'Not Evaluated'}</div>
                            <textarea onchange="app.updateItemRemarks(${idx}, this.value)" placeholder="Remarks..." class="w-full text-sm mt-2 p-2 border rounded no-print resize-none bg-slate-50">${item.remarks}</textarea>
                            <div class="hidden print:block text-[9px] italic mt-1 text-slate-600">${item.remarks}</div>
                            ${photos}
                        </div>
                        <div class="flex flex-col gap-2 md:w-48 no-print shrink-0">
                            <div class="flex gap-1">
                                <button onclick="app.updateItemStatus(${idx}, 'compliant')" class="status-btn flex-1 py-2 text-xs border rounded ${item.status==='compliant'?'selected-compliant':''}">Yes</button>
                                <button onclick="app.updateItemStatus(${idx}, 'non-compliant')" class="status-btn flex-1 py-2 text-xs border rounded ${item.status==='non-compliant'?'selected-non-compliant':''}">No</button>
                                <button onclick="app.updateItemStatus(${idx}, 'na')" class="status-btn flex-1 py-2 text-xs border rounded ${item.status==='na'?'selected-na':''}">N/A</button>
                            </div>
                            <button onclick="app.triggerPhotoUpload(${idx})" class="w-full py-2 bg-teal-50 border text-teal-700 text-xs rounded font-medium flex items-center justify-center gap-2">
                                <i class="fa-solid fa-camera"></i> Evidence
                            </button>
                        </div>
                    `;
                    container.appendChild(row);
                });
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
