<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MOD Audit Checklist - High-Clarity Evidence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Native App Feel */
        body {
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        button, input, textarea { touch-action: manipulation; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media print {
            body { background-color: white !important; color: black !important; font-size: 10px !important; line-height: 1.2 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-border { border: 1px solid #e5e7eb !important; }
            .avoid-break { page-break-inside: avoid; }
            
            /* PDF Specific Image Handling - Large enough to zoom in PDF reader */
            .print\:w-32 { width: 8.5rem !important; }
            .print\:h-32 { height: 8.5rem !important; }
            
            input, textarea { 
                border: none !important; 
                background: transparent !important;
                resize: none !important;
                padding: 0 !important;
            }
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
        }
        
        body.preview-mode { background-color: white !important; color: black !important; }
        body.preview-mode .no-print { display: none !important; }
        body.preview-mode .print-only { display: block !important; }

        .status-btn.selected-compliant { background-color: #0d9488; color: white; border-color: #0d9488; }
        .status-btn.selected-non-compliant { background-color: #ef4444; color: white; border-color: #ef4444; }
        .status-btn.selected-na { background-color: #64748b; color: white; border-color: #64748b; }

        /* Web View Modal */
        #image-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #image-modal img {
            max-width: 98%;
            max-height: 98%;
            object-fit: contain;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- Image Modal for Browser UI -->
    <div id="image-modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="Full size evidence">
        <div class="absolute bottom-6 text-white bg-black/60 px-5 py-2 rounded-full text-sm font-medium">Tap anywhere to close</div>
    </div>

    <!-- Exit Preview Button -->
    <button id="exit-preview-btn" onclick="app.togglePreview()" class="fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold z-50 transition-transform hover:scale-105 hidden items-center gap-2">
        <i class="fa-solid fa-eye-slash"></i> Exit Preview
    </button>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="max-w-5xl mx-auto p-4 sm:p-6 transition-opacity duration-300">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-10 mt-4 sm:mt-6 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i class="fa-solid fa-clipboard-check text-teal-600"></i>
                    MOD Audit Checklist
                </h1>
                <p class="text-sm sm:text-base text-slate-500 mt-1">High-clarity reporting optimized for 10MB attachments.</p>
            </div>
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <button onclick="window.location.reload()" class="bg-white border text-slate-700 px-4 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh
                </button>
                <button onclick="app.createNewReport()" class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-plus"></i> New Audit
                </button>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b bg-slate-50/50">
                <h2 class="text-lg font-semibold text-slate-800">Recent Audit Logs</h2>
            </div>
            <div id="empty-state" class="p-12 text-center text-slate-500 flex flex-col items-center hidden">
                <i class="fa-solid fa-folder-open text-5xl text-slate-300 mb-4"></i>
                <p class="text-lg">No audit reports found.</p>
            </div>
            <ul id="report-list" class="divide-y divide-slate-100"></ul>
        </div>
    </div>

    <!-- Editor View -->
    <div id="editor-view" class="max-w-5xl mx-auto p-3 sm:p-6 hidden print:p-0 print:max-w-none print:block">
        
        <!-- Toolbar -->
        <div class="no-print flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 sm:mb-6 bg-white p-3 sm:p-4 rounded-xl shadow-sm border border-slate-200 sticky top-0 z-50 gap-3">
            <button onclick="app.showDashboard()" class="text-slate-600 hover:text-slate-900 flex items-center gap-2 font-medium">
                <i class="fa-solid fa-arrow-left"></i> Exit Editor
            </button>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <span id="save-status" class="hidden sm:inline text-xs font-bold text-teal-600 uppercase tracking-widest mr-2">Auto-saved</span>
                <button onclick="app.togglePreview()" class="bg-teal-50 hover:bg-teal-100 text-teal-700 px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    <i class="fa-solid fa-eye"></i> Preview
                </button>
                <button onclick="window.print()" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    <i class="fa-solid fa-file-pdf"></i> Save PDF
                </button>
            </div>
        </div>

        <!-- Meta Header -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mb-6 print:p-3 print:mb-2">
            <h2 class="text-xl sm:text-2xl font-bold text-slate-900 print:text-base mb-4 border-b pb-2">MOD Audit Checklist</h2>
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 print:gap-2">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Date</label>
                    <input type="date" id="meta-date" class="w-full border-b py-1 outline-none font-medium print:text-[11px]" onchange="app.updateMeta('date', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Day</label>
                    <input type="text" id="meta-day" placeholder="Monday" class="w-full border-b py-1 outline-none font-medium print:text-[11px]" onchange="app.updateMeta('day', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">MOD Name</label>
                    <input type="text" id="meta-modName" placeholder="Name" class="w-full border-b py-1 outline-none font-medium print:text-[11px]" onchange="app.updateMeta('modName', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Time In</label>
                    <input type="time" id="meta-timeIn" class="w-full border-b py-1 outline-none font-medium print:text-[11px]" onchange="app.updateMeta('timeIn', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Time Out</label>
                    <input type="time" id="meta-timeOut" class="w-full border-b py-1 outline-none font-medium print:text-[11px]" onchange="app.updateMeta('timeOut', this.value)">
                </div>
            </div>
        </div>

        <!-- Checklist -->
        <div id="checklist-container" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden divide-y print:mb-4"></div>

        <!-- General Remarks -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mt-6 print:p-3 print:mt-2 avoid-break">
            <div class="flex justify-between items-center mb-4">
                <label class="block text-lg font-bold text-slate-900 print:text-base">Manager Observations</label>
                <button onclick="app.triggerGeneralPhotoUpload()" class="no-print bg-slate-100 px-4 py-2 rounded text-sm font-bold border border-slate-200 shadow-sm">
                    <i class="fa-solid fa-camera mr-2"></i> Add Evidence
                </button>
            </div>
            <textarea id="meta-observation" rows="5" class="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-teal-600 print:hidden text-slate-800" onchange="app.updateMeta('observation', this.value)"></textarea>
            <div id="print-meta-observation" class="hidden print:block whitespace-pre-wrap text-[11px] leading-relaxed"></div>
            
            <div id="general-photos-container" class="mt-4 flex gap-3 flex-wrap print:mt-2"></div>
        </div>

        <input type="file" id="item-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleItemPhotoUpload(event)">
        <input type="file" id="general-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleGeneralPhotoUpload(event)">
    </div>

    <script>
        "use strict";

        const AUDIT_QUESTIONS = Object.freeze([
            "[Guest Interaction] Speak to three (3) guests / Name/Room / Feedback",
            "[Staff Interaction] Speak to three (3) staff members / Different Depts",
            "[General Areas] Main Entrance",
            "[General Areas] Porch arrival standards",
            "[General Areas] Front Desk",
            "[General Areas] Check-In process SOP following",
            "[General Areas] Communication Centre",
            "[General Areas] Business Centre",
            "[General Areas] Swimming Pool/Gym",
            "[General Areas] Tattva Spa",
            "[General Areas] Wet Area Restroom",
            "[General Areas] Steam/Sauna/Jacuzzi",
            "[General Areas] Water Body - Main Porch",
            "[General Areas] Water Body - Mehfil Lawn",
            "[General Areas] Main Porch (Vehicle Free)",
            "[General Areas] Bus Parking Area",
            "[General Areas] Exit Gate Manning",
            "[General Areas] Lobby Area Restroom",
            "[General Areas] Mezzanine Area Restroom",
            "[General Areas] Arrivals at 22:00",
            "[General Areas] VIP Expected Status",
            "[Food & Beverage] Spring Restaurant",
            "[Food & Beverage] Spring Patio",
            "[Food & Beverage] IRD Service",
            "[Food & Beverage] Myst",
            "[Food & Beverage] Myst Patio",
            "[Food & Beverage] Mysouth",
            "[Food & Beverage] Banquets (Mehfil & Lawn)",
            "[Cover Tally] Enter Cover Tally",
            "[Employee Facilities] Samovar standards",
            "[Employee Facilities] Plates and cutlery washed - Samovar",
            "[Employee Facilities] Table and chairs cleaned - Samovar",
            "[Employee Facilities] Ladies drop",
            "[Back of House] Locker Rooms",
            "[Back of House] Bakery",
            "[Back of House] Commissary",
            "[Back of House] Grinder Room",
            "[Back of House] Walk-In Freezers",
            "[Back of House] Main Kitchen Store",
            "[Back of House] Main Kitchen",
            "[Back of House] D-Bar",
            "[Back of House] Mysouth Kitchen Area",
            "[Back of House] Myst Kitchen Area",
            "[Back of House] Samovar Kitchen Area",
            "[Back of House] Service Floor",
            "[Back of House] BOH corridors",
            "[Back of House] Dock Level",
            "[Back of House] Staff Entrance",
            "[Back of House] Garbage area",
            "[Back of House] Stewarding areas",
            "[Back of House] Indoor parking lot",
            "[Back of House] Smoking Area",
            "[Back of House] Basement Parking Area",
            "[Back of House] Drivers Restroom",
            "[Floors] Check for IRD trays / Cleanliness",
            "[Room Checks] Please check 2 rooms thoroughly",
            "[Fire Life Safety] Incidents (Guests or Staff)",
            "[Fire Life Safety] Fire escape routes clear",
            "[Fire Life Safety] Kitchens / back of house dangerous points",
            "[Test Calls] Make test calls and indicate comments"
        ]);

        const app = {
            reports: [],
            currentReportId: null,
            
            init() {
                try {
                    const stored = localStorage.getItem('mod_audit_v7_data');
                    if (stored) this.reports = JSON.parse(stored);
                } catch (e) { console.error(e); }
                this.renderDashboard();
            },

            saveToLocal() {
                try {
                    localStorage.setItem('mod_audit_v7_data', JSON.stringify(this.reports));
                    const s = document.getElementById('save-status');
                    if(s) { s.classList.remove('hidden'); setTimeout(() => s.classList.add('hidden'), 1500); }
                } catch (e) {
                    console.error("Storage Error", e);
                    const msg = document.createElement('div');
                    msg.className = "fixed top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-lg shadow-2xl z-[9999]";
                    msg.textContent = "Storage Full! Please delete older reports to save this audit.";
                    document.body.appendChild(msg);
                    setTimeout(() => msg.remove(), 4000);
                }
            },

            showDashboard() {
                document.body.classList.remove('preview-mode');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('editor-view').classList.add('hidden');
                this.renderDashboard();
            },

            togglePreview() {
                document.body.classList.toggle('preview-mode');
                window.scrollTo(0, 0);
            },

            openImage(src) {
                const modal = document.getElementById('image-modal');
                const img = document.getElementById('modal-img');
                img.src = src;
                modal.style.display = 'flex';
            },

            createNewReport() {
                const newReport = {
                    id: Date.now().toString(),
                    meta: { date: new Date().toISOString().split('T')[0], day: '', modName: '', timeIn: '', timeOut: '', observation: '' },
                    generalPhotos: [],
                    items: {}
                };
                AUDIT_QUESTIONS.forEach((q, idx) => { newReport.items[idx] = { status: null, remarks: '', photos: [] }; });
                this.reports.unshift(newReport);
                this.currentReportId = newReport.id;
                this.saveToLocal();
                this.renderEditor();
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            openReport(id) {
                this.currentReportId = id;
                const r = this.reports.find(x => x.id === id);
                if (r) {
                    AUDIT_QUESTIONS.forEach((q, idx) => {
                        if (!r.items[idx]) {
                            r.items[idx] = { status: null, remarks: '', photos: [] };
                        }
                    });
                }
                this.renderEditor();
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            updateMeta(field, value) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (r) {
                    r.meta[field] = value;
                    if (field === 'observation') document.getElementById('print-meta-observation').textContent = value;
                    this.saveToLocal();
                }
            },

            updateItemStatus(idx, status) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (r) {
                    r.items[idx].status = (r.items[idx].status === status) ? null : status;
                    this.saveToLocal();
                    this.renderChecklist();
                }
            },

            updateItemRemarks(idx, value) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (r) { r.items[idx].remarks = value; this.saveToLocal(); }
            },

            /**
             * Optimized Compression for High-Res Evidence
             * - MAX: 1024px (Crisp HD Clarity)
             * - Quality: 0.75 (Professional balance for 10MB mail limit)
             */
            compressImage(file, callback) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 1024; 
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        // 0.75 provides high clarity for zoom while keeping file size small
                        callback(canvas.toDataURL('image/jpeg', 0.75)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

            currentIdx: null,
            triggerPhotoUpload(idx) { this.currentIdx = idx; document.getElementById('item-photo-upload').click(); },
            handleItemPhotoUpload(e) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (!r) return;
                Array.from(e.target.files).forEach(f => {
                    this.compressImage(f, (b64) => {
                        r.items[this.currentIdx].photos.push(b64);
                        this.saveToLocal();
                        this.renderChecklist();
                    });
                });
                e.target.value = '';
            },

            removeItemPhoto(itemIdx, photoIdx) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (r && r.items[itemIdx]) {
                    r.items[itemIdx].photos.splice(photoIdx, 1);
                    this.saveToLocal();
                    this.renderChecklist();
                }
            },

            triggerGeneralPhotoUpload() { document.getElementById('general-photo-upload').click(); },
            handleGeneralPhotoUpload(e) {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (!r) return;
                Array.from(e.target.files).forEach(f => {
                    this.compressImage(f, (b64) => {
                        r.generalPhotos.push(b64);
                        this.saveToLocal();
                        this.renderGeneralPhotos();
                    });
                });
                e.target.value = '';
            },

            renderGeneralPhotos() {
                const r = this.reports.find(x => x.id === this.currentReportId);
                const c = document.getElementById('general-photos-container');
                c.innerHTML = r.generalPhotos.map((p, idx) => `
                    <div class="relative group w-32 h-32 border rounded overflow-hidden shadow-sm">
                        <img src="${p}" onclick="app.openImage(this.src)" class="w-full h-full object-cover cursor-zoom-in">
                        <button onclick="r.generalPhotos.splice(${idx},1); app.saveToLocal(); app.renderGeneralPhotos()" class="no-print absolute top-0 right-0 bg-red-600 text-white p-1 text-[9px] font-bold shadow-md">DEL</button>
                    </div>
                `).join('');
            },

            renderDashboard() {
                const list = document.getElementById('report-list');
                const empty = document.getElementById('empty-state');
                list.innerHTML = '';
                if (!this.reports.length) { empty.classList.remove('hidden'); return; }
                empty.classList.add('hidden');
                this.reports.forEach(r => {
                    const li = document.createElement('li');
                    li.className = "p-5 hover:bg-slate-50 cursor-pointer flex justify-between items-center transition-colors group";
                    li.onclick = () => this.openReport(r.id);
                    li.innerHTML = `
                        <div>
                            <div class="font-bold text-slate-900">${r.meta.modName || 'Audit Log'}</div>
                            <div class="text-xs text-slate-500 mt-1"><i class="fa-regular fa-calendar mr-1"></i> ${r.meta.date} ${r.meta.day ? '• '+r.meta.day : ''}</div>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="event.stopPropagation(); if(confirm('Delete?')){ app.reports = app.reports.filter(x => x.id !== '${r.id}'); app.saveToLocal(); app.renderDashboard(); }" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-600 transition-all p-2">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                            <i class="fa-solid fa-chevron-right text-slate-300"></i>
                        </div>
                    `;
                    list.appendChild(li);
                });
            },

            renderEditor() {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (!r) return;
                document.getElementById('meta-date').value = r.meta.date;
                document.getElementById('meta-day').value = r.meta.day;
                document.getElementById('meta-modName').value = r.meta.modName;
                document.getElementById('meta-timeIn').value = r.meta.timeIn;
                document.getElementById('meta-timeOut').value = r.meta.timeOut;
                document.getElementById('meta-observation').value = r.meta.observation;
                document.getElementById('print-meta-observation').textContent = r.meta.observation;
                this.renderChecklist();
                this.renderGeneralPhotos();
            },

            renderChecklist() {
                const r = this.reports.find(x => x.id === this.currentReportId);
                if (!r) return;
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';
                let currentCat = '';

                AUDIT_QUESTIONS.forEach((q, idx) => {
                    const item = r.items[idx];
                    if (!item) return; 
                    
                    const cat = q.match(/^\[(.*?)\]/)?.[1] || "Evaluation";
                    const cleanQ = q.replace(/^\[(.*?)\]\s*/, '');

                    if (cat !== currentCat) {
                        const h = document.createElement('div');
                        h.className = "bg-teal-50 px-5 py-2.5 font-bold text-teal-900 border-y text-xs uppercase tracking-wider print:bg-slate-100 print:text-black";
                        h.textContent = cat;
                        container.appendChild(h);
                        currentCat = cat;
                    }

                    const row = document.createElement('div');
                    row.className = "p-4 sm:p-6 flex flex-col md:flex-row gap-5 border-b last:border-0 print:p-2.5 print:gap-1 avoid-break";
                    
                    // Logic to remove photo evidence tabs for specific audit points as per previous requests
                    const showPhotoFeature = idx >= 33 && ![54, 56, 57, 58, 59].includes(idx);

                    const photosHtml = (showPhotoFeature && item.photos.length) ? `
                        <div class="flex flex-wrap gap-2.5 mt-3 print:mt-1.5">
                            ${item.photos.map((p, pIdx) => `
                                <div class="relative group w-28 h-28 border rounded overflow-hidden shadow-sm print:w-32 print:h-32">
                                    <img src="${p}" onclick="app.openImage(this.src)" class="w-full h-full object-cover cursor-zoom-in">
                                    <div class="no-print absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center pointer-events-none transition-opacity">
                                        <i class="fa-solid fa-magnifying-glass-plus text-white text-xl"></i>
                                    </div>
                                    <button onclick="app.removeItemPhoto(${idx}, ${pIdx})" class="no-print absolute top-0 right-0 bg-red-600 text-white w-5 h-5 flex items-center justify-center text-[10px] font-bold shadow-md">
                                        <i class="fa-solid fa-x"></i>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    ` : '';

                    row.innerHTML = `
                        <div class="flex-1">
                            <div class="flex gap-3">
                                <span class="text-slate-400 font-black text-sm">${idx + 1}.</span>
                                <p class="font-bold text-slate-800 text-sm print:text-[11px] leading-relaxed">${cleanQ}</p>
                            </div>
                            <div class="hidden print:block font-bold text-[9px] mt-1 text-teal-700">RESULT: ${item.status ? item.status.toUpperCase() : 'PENDING'}</div>
                            <textarea onchange="app.updateItemRemarks(${idx}, this.value)" placeholder="Enter findings..." class="w-full text-sm mt-3 p-3 border rounded-lg no-print resize-none bg-slate-50 focus:ring-2 focus:ring-teal-500 outline-none">${item.remarks || ''}</textarea>
                            <div class="hidden print:block text-[10px] italic mt-1.5 text-slate-600 pl-6">${item.remarks || '(No remarks)'}</div>
                            ${photosHtml}
                        </div>
                        <div class="flex flex-col gap-2.5 md:w-52 no-print shrink-0">
                            <div class="flex gap-1.5">
                                <button onclick="app.updateItemStatus(${idx}, 'compliant')" class="status-btn flex-1 py-2.5 text-xs font-bold border rounded-md ${item.status==='compliant'?'selected-compliant':'bg-white text-slate-600'}">YES</button>
                                <button onclick="app.updateItemStatus(${idx}, 'non-compliant')" class="status-btn flex-1 py-2.5 text-xs font-bold border rounded-md ${item.status==='non-compliant'?'selected-non-compliant':'bg-white text-slate-600'}">NO</button>
                                <button onclick="app.updateItemStatus(${idx}, 'na')" class="status-btn flex-1 py-2.5 text-xs font-bold border rounded-md ${item.status==='na'?'selected-na':'bg-white text-slate-600'}">N/A</button>
                            </div>
                            ${showPhotoFeature ? `
                            <button onclick="app.triggerPhotoUpload(${idx})" class="w-full py-2.5 bg-white border border-slate-200 text-slate-700 text-xs rounded-md font-bold flex items-center justify-center gap-2 hover:bg-slate-50 shadow-sm">
                                <i class="fa-solid fa-camera"></i> ATTACH PHOTO
                            </button>
                            ` : ''}
                        </div>
                    `;
                    container.appendChild(row);
                });
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
