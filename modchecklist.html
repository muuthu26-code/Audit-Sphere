<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    
    <!-- ADVANCED SECURITY: Safari-Compatible Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self' https://cdn.tailwindcss.com; object-src 'none'; base-uri 'self'; form-action 'none';">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Updated MOD Audit Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Native App Feel for iOS/Android */
        body {
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        button, input, textarea {
            touch-action: manipulation;
        }

        /* Hide scrollbars for smooth swiping on mobile */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Print media query - Highly optimized for multi-photo sub-10 page limits */
        @media print {
            body { background-color: white !important; color: black !important; font-size: 10px !important; line-height: 1.2 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-border { border: 1px solid #e5e7eb !important; }
            .print-shadow-none { box-shadow: none !important; }
            .page-break { page-break-before: always; }
            .avoid-break { page-break-inside: avoid; }
            
            /* Aggressive Page Reduction Classes for PDF Export */
            .print\:p-0 { padding: 0 !important; }
            .print\:p-0\.5 { padding: 0.125rem !important; }
            .print\:p-1 { padding: 0.25rem !important; }
            .print\:p-2 { padding: 0.5rem !important; }
            .print\:py-0 { padding-top: 0 !important; padding-bottom: 0 !important; }
            .print\:py-0\.5 { padding-top: 0.125rem !important; padding-bottom: 0.125rem !important; }
            .print\:py-1 { padding-top: 0.25rem !important; padding-bottom: 0.25rem !important; }
            .print\:px-1 { padding-left: 0.25rem !important; padding-right: 0.25rem !important; }
            .print\:pt-0 { padding-top: 0 !important; }
            .print\:pt-0\.5 { padding-top: 0.125rem !important; }
            .print\:mt-0 { margin-top: 0 !important; }
            .print\:mt-0\.5 { margin-top: 0.125rem !important; }
            .print\:mt-1 { margin-top: 0.25rem !important; }
            .print\:mb-0 { margin-bottom: 0 !important; }
            .print\:mb-0\.5 { margin-bottom: 0.125rem !important; }
            .print\:mb-1 { margin-bottom: 0.25rem !important; }
            .print\:gap-0\.5 { gap: 0.125rem !important; }
            .print\:gap-1 { gap: 0.25rem !important; }
            .print\:text-\[9px\] { font-size: 9px !important; line-height: 1.1 !important; }
            .print\:text-\[10px\] { font-size: 10px !important; line-height: 1.2 !important; }
            .print\:leading-tight { line-height: 1.1 !important; }
            .print\:min-h-\[20px\] { min-height: 20px !important; }
            
            /* Ultra-compact image thumbnails for 10+ page reduction */
            .print\:w-12 { width: 3rem !important; } /* 48px */
            .print\:h-12 { height: 3rem !important; } /* 48px */
            .print\:w-16 { width: 4rem !important; } /* 64px for general photos */
            .print\:h-16 { height: 4rem !important; }
            
            /* Clean up inputs for printing */
            input, textarea { 
                border: none !important; 
                background: transparent !important;
                resize: none !important;
                padding: 0 !important;
                min-height: 0 !important;
            }
            input::placeholder, textarea::placeholder { color: transparent !important; }
            
            /* Force background colors to show in print (Chrome/Edge) */
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
        }
        
        /* On-Screen Preview Mode (Mimics print layout) */
        body.preview-mode { background-color: white !important; color: black !important; }
        body.preview-mode .no-print { display: none !important; }
        body.preview-mode .print-only { display: block !important; }
        body.preview-mode .print-border { border: 1px solid #e5e7eb !important; }
        body.preview-mode .print-shadow-none { box-shadow: none !important; }
        body.preview-mode input, body.preview-mode textarea { 
            border: none !important; 
            background: transparent !important;
            resize: none !important;
            padding: 0 !important;
            pointer-events: none; /* Make uneditable */
        }
        body.preview-mode input::placeholder, body.preview-mode textarea::placeholder { color: transparent !important; }
        body.preview-mode .hidden.print\:block { display: block !important; }
        body.preview-mode .print\:hidden { display: none !important; } /* Fix for textarea mirroring */
        body.preview-mode #exit-preview-btn { display: flex !important; }

        /* Custom toggles */
        .status-btn.selected-compliant { background-color: #0d9488; color: white; border-color: #0d9488; }
        .status-btn.selected-non-compliant { background-color: #ef4444; color: white; border-color: #ef4444; }
        .status-btn.selected-na { background-color: #64748b; color: white; border-color: #64748b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- Exit Preview Floating Button -->
    <button id="exit-preview-btn" onclick="app.togglePreview()" class="fixed bottom-8 right-8 bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold z-50 transition-transform hover:scale-105 hidden items-center gap-2">
        <i class="fa-solid fa-eye-slash"></i> Exit Preview
    </button>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="max-w-5xl mx-auto p-4 sm:p-6 transition-opacity duration-300">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-10 mt-4 sm:mt-6 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i class="fa-solid fa-clipboard-user text-teal-600"></i>
                    MOD Audit Checklist
                </h1>
                <p class="text-sm sm:text-base text-slate-500 mt-1">Manage and file your updated Manager On Duty audits securely.</p>
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <button onclick="window.location.reload()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 transition-colors shadow-sm">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh
                </button>
                <button onclick="app.createNewReport()" class="bg-teal-600 hover:bg-teal-700 text-white px-5 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 transition-colors shadow-sm">
                    <i class="fa-solid fa-plus"></i> New MOD Audit
                </button>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-200 bg-slate-50/50">
                <h2 class="text-lg font-semibold text-slate-800">Recent Reports</h2>
            </div>
            
            <div id="empty-state" class="p-12 text-center text-slate-500 flex flex-col items-center hidden">
                <i class="fa-solid fa-shield-halved text-5xl text-slate-300 mb-4"></i>
                <p class="text-lg">No audit reports filed yet.</p>
                <p class="text-sm mt-1">Click the "New MOD Audit" button to get started.</p>
            </div>

            <ul id="report-list" class="divide-y divide-slate-100">
                <!-- Reports injected via JS -->
            </ul>
        </div>
    </div>

    <!-- Editor View -->
    <div id="editor-view" class="max-w-5xl mx-auto p-3 sm:p-6 hidden print:p-0 print:max-w-none print:block">
        
        <!-- Top Action Bar (Hidden in Print & Preview) -->
        <div class="no-print flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 sm:mb-6 bg-white p-3 sm:p-4 rounded-xl shadow-sm border border-slate-200 sticky top-0 z-50 gap-3">
            <div class="flex justify-between w-full sm:w-auto items-center">
                <button onclick="app.showDashboard()" class="text-slate-600 hover:text-slate-900 flex items-center gap-2 font-medium transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
                <span id="save-status-mobile" class="text-xs text-slate-400 sm:hidden">Saved locally</span>
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <span id="save-status" class="hidden sm:inline text-sm text-slate-400 mr-2">Saved locally</span>
                <button onclick="app.refreshReport()" class="bg-slate-100 hover:bg-slate-200 text-slate-800 p-2 sm:px-4 sm:py-2 rounded-lg font-medium flex items-center justify-center transition-colors" title="Clear and reset form">
                    <i class="fa-solid fa-arrows-rotate text-slate-500"></i><span class="hidden sm:inline ml-2">Refresh</span>
                </button>
                <button onclick="app.togglePreview()" class="bg-teal-50 hover:bg-teal-100 text-teal-700 px-3 py-2 sm:px-4 sm:py-2 rounded-lg font-medium flex-1 sm:flex-none flex items-center justify-center gap-2 transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-eye"></i> Preview
                </button>
                <button onclick="app.saveReport()" class="bg-slate-100 hover:bg-slate-200 text-slate-800 px-3 py-2 sm:px-4 sm:py-2 rounded-lg font-medium flex-1 sm:flex-none flex items-center justify-center gap-2 transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-save text-slate-500"></i> Save
                </button>
                <button onclick="window.print()" class="bg-teal-600 hover:bg-teal-700 text-white px-3 py-2 sm:px-4 sm:py-2 rounded-lg font-medium w-full sm:w-auto flex items-center justify-center gap-2 transition-colors text-sm sm:text-base mt-1 sm:mt-0">
                    <i class="fa-solid fa-file-pdf"></i> Export PDF
                </button>
            </div>
        </div>

        <!-- Report Header / Metadata -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mb-6 print-shadow-none print-border print:p-2 print:mb-1">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b pb-4 gap-4 print:mb-1 print:pb-1 print:gap-1">
                <h2 class="text-xl sm:text-2xl font-bold text-slate-900 print:text-base">MOD Audit Report</h2>
            </div>
            
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 sm:gap-6 mb-2 print:gap-1 print:mb-0">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 print:mb-0 print:text-[9px]">Date Conducted On</label>
                    <input type="date" id="meta-date" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-teal-600 transition-colors bg-transparent text-slate-800 font-medium text-base print:py-0 print:text-[10px]" onchange="app.updateMeta('date', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 print:mb-0 print:text-[9px]">Day</label>
                    <input type="text" id="meta-day" placeholder="e.g. Monday" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-teal-600 transition-colors bg-transparent text-slate-800 font-medium text-base print:py-0 print:text-[10px]" onchange="app.updateMeta('day', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 print:mb-0 print:text-[9px]">MOD Name</label>
                    <input type="text" id="meta-modName" placeholder="Manager Name" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-teal-600 transition-colors bg-transparent text-slate-800 font-medium text-base print:py-0 print:text-[10px]" onchange="app.updateMeta('modName', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 print:mb-0 print:text-[9px]">Time In</label>
                    <input type="time" id="meta-timeIn" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-teal-600 transition-colors bg-transparent text-slate-800 font-medium text-base print:py-0 print:text-[10px]" onchange="app.updateMeta('timeIn', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 print:mb-0 print:text-[9px]">Time Out</label>
                    <input type="time" id="meta-timeOut" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-teal-600 transition-colors bg-transparent text-slate-800 font-medium text-base print:py-0 print:text-[10px]" onchange="app.updateMeta('timeOut', this.value)">
                </div>
            </div>
        </div>

        <!-- Checklist -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print-shadow-none print-border mb-6 print:mb-2">
            <div id="checklist-container" class="divide-y divide-slate-100 print:divide-slate-200">
                <!-- Checklist items injected via JS -->
            </div>
        </div>

        <!-- Final Observations -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mb-6 print-shadow-none print-border avoid-break print:p-2 print:mb-0">
            <div class="flex justify-between items-center mb-3 print:mb-1">
                <label class="block text-lg font-bold text-slate-900 print:text-base">General Audit Observation</label>
                <button onclick="app.triggerGeneralPhotoUpload()" class="no-print bg-slate-100 hover:bg-slate-200 text-slate-700 py-1.5 px-3 rounded text-sm font-medium flex items-center justify-center gap-1.5 transition-colors border border-slate-200">
                    <i class="fa-solid fa-camera"></i> Attach Photos
                </button>
            </div>
            <textarea id="meta-observation" rows="5" placeholder="Enter any final overall observations..." class="w-full border border-slate-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-teal-600 transition-all text-base text-slate-800 print:hidden" onchange="app.updateMeta('observation', this.value)" oninput="document.getElementById('print-meta-observation').textContent = this.value"></textarea>
            
            <!-- Mirror Div for Print (Guarantees text won't be cut off in PDF export) -->
            <div id="print-meta-observation" class="hidden print:block w-full text-base text-slate-800 whitespace-pre-wrap min-h-[100px] print:text-[10px] print:min-h-[20px]"></div>
            
            <!-- General Photos Container -->
            <div id="general-photos-container" class="mt-4 flex gap-3 overflow-x-auto pb-2 hide-scrollbar touch-pan-x empty:hidden print:mt-1 print:flex-wrap print:overflow-visible print:gap-1">
                <!-- General Photos injected via JS -->
            </div>
        </div>

        <!-- Hidden Global Item Photo Input -->
        <input type="file" id="item-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleItemPhotoUpload(event)">
        <!-- Hidden Global Observation Photo Input -->
        <input type="file" id="general-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleGeneralPhotoUpload(event)">

    </div>

    <script>
        "use strict"; // ADVANCED SECURITY: Enforce strict execution context

        // ADVANCED SECURITY Feature: Strict HTML Escaping to prevent XSS malware/hacks via text inputs
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag]));
        }

        // ADVANCED SECURITY: Immutable Data Structure
        const AUDIT_QUESTIONS = Object.freeze([
            "[Guest Interaction] Please speak to three (3) guests/indicate Name/Room Number and Feedback",
            "[Staff Interaction] Please speak to three (3) staff members from three different departments/indicate name and provide feedback relevant to employee satisfaction/engagement.",
            "[General Areas] Main Entrance",
            "[General Areas] Observe one arrival at the porch and indicate whether all standards are being followed",
            "[General Areas] Front Desk",
            "[General Areas] Observe one check-In process and indicate whether all SOPs are fully followed",
            "[General Areas] Communication Centre",
            "[General Areas] Business Centre",
            "[General Areas] Swimming Pool/Gym",
            "[General Areas] Tattva Spa",
            "[General Areas] Wet Area Restroom",
            "[General Areas] Steam/Sauna/Jacuzzi",
            "[General Areas] Water Body in Main Porch",
            "[General Areas] Water Body in Mehfil Lawn",
            "[General Areas] Main Porch (Free of Vehicles)",
            "[General Areas] Bus Parking Area",
            "[General Areas] Exit Gate Manning (19.30 hrs to 20.00 hrs)",
            "[General Areas] Lobby Area Restroom",
            "[General Areas] Mezzanine Area Restroom",
            "[General Areas] How many arrivals are still to come at 22:00",
            "[General Areas] Any VIP expected? If yes, please ensure to meet him/her",
            "[Food & Beverage] Spring",
            "[Food & Beverage] Spring Patio",
            "[Food & Beverage] IRD",
            "[Food & Beverage] Myst",
            "[Food & Beverage] Myst Patio",
            "[Food & Beverage] Mysouth",
            "[Food & Beverage] Banquets (Mehfil & Mehfil Lawn)",
            "[Cover Tally Check] Enter Cover Tally",
            "[Employee Facilities] Team members adhere to “Samovar standards”",
            "[Employee Facilities] Plates and cutlery are properly washed and dried before dinner time - Samovar",
            "[Employee Facilities] Table and chairs are cleaned and neatly arranged - Samovar",
            "[Employee Facilities] Ladies drop",
            "[Back of the House] Locker Rooms",
            "[Back of the House] Bakery",
            "[Back of the House] Commissary",
            "[Back of the House] Grinder Room",
            "[Back of the House] Walk-In Freezers (Basement)",
            "[Back of the House] Main Kitchen Store",
            "[Back of the House] Main Kitchen",
            "[Back of the House] D-Bar",
            "[Back of the House] Mysouth Kitchen and Store Area",
            "[Back of the House] Myst Kitchen and Store Area",
            "[Back of the House] Samovar Kitchen and Store Area",
            "[Back of the House] Service Floor",
            "[Back of the House] Back of house corridors",
            "[Back of the House] Dock Level",
            "[Back of the House] Staff Entrance",
            "[Back of the House] Garbage area",
            "[Back of the House] Stewarding areas",
            "[Back of the House] Indoor parking lot",
            "[Back of the House] Smoking Area",
            "[Back of the House] Basement Parking Area",
            "[Back of the House] Drivers Restroom",
            "[Floors] Floor Number(s) - Check for IRD trays / Cleanliness / Pantries / Security issues",
            "[Room Checks] Please check 2 rooms thoroughly and give your feedback",
            "[Fire Life Safety] Incidents (Guests or Staff involved - Ensure form is filled)",
            "[Fire Life Safety] Fire escape routes clear (specify locations)",
            "[Fire Life Safety] Kitchens / back of house (any dangerous points)",
            "[Test Calls] Make test calls and indicate comments (Number of rings)"
        ]);

        const app = {
            reports: [],
            currentReportId: null,
            
            init() {
                // Safely attempt to load local storage (Fixes Safari restrictions)
                try {
                    const stored = localStorage.getItem('hotelModAuditsV3');
                    if (stored) {
                        try {
                            const parsed = JSON.parse(stored);
                            if (Array.isArray(parsed)) {
                                this.reports = parsed;
                            }
                        } catch (e) {
                            console.error("Could not parse stored reports.");
                        }
                    }
                } catch (e) {
                    console.warn("Local storage access is restricted (common in Safari local files). Data won't persist after closing tab.");
                }
                this.renderDashboard();
            },

            saveToLocal() {
                try {
                    localStorage.setItem('hotelModAuditsV3', JSON.stringify(this.reports));
                    
                    const statusIndicator = document.getElementById('save-status');
                    const statusIndicatorMobile = document.getElementById('save-status-mobile');
                    
                    if(statusIndicator) statusIndicator.textContent = "Saving...";
                    if(statusIndicatorMobile) statusIndicatorMobile.textContent = "Saving...";
                    
                    setTimeout(() => {
                        if(statusIndicator) statusIndicator.textContent = "Saved locally";
                        if(statusIndicatorMobile) statusIndicatorMobile.textContent = "Saved locally";
                    }, 1000);
                } catch (e) {
                    console.warn("Unable to save data to local storage. You may need to run this on a server instead of a local file.");
                }
            },

            showDashboard() {
                document.body.classList.remove('preview-mode');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('editor-view').classList.add('hidden');
                this.currentReportId = null;
                this.renderDashboard();
            },

            showEditor() {
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            togglePreview() {
                document.body.classList.toggle('preview-mode');
                window.scrollTo(0, 0);
            },

            createNewReport() {
                const newReport = {
                    id: Date.now().toString(),
                    meta: {
                        date: new Date().toISOString().split('T')[0],
                        day: '',
                        modName: '',
                        timeIn: '',
                        timeOut: '',
                        observation: ''
                    },
                    generalPhotos: [],
                    guestInteractions: [
                        {name: '', room: '', feedback: ''},
                        {name: '', room: '', feedback: ''},
                        {name: '', room: '', feedback: ''}
                    ],
                    staffInteractions: [
                        {name: '', dept: '', remarks: ''},
                        {name: '', dept: '', remarks: ''},
                        {name: '', dept: '', remarks: ''}
                    ],
                    roomChecks: [
                        {room: '', remarks: ''},
                        {room: '', remarks: ''}
                    ],
                    testCalls: { spring: '', ird: '', mysouth: '', myst: '', onetouch: '' },
                    checkInProcess: { guestName: '', roomNo: '' },
                    mainEntrance: [
                        { area: 'In-Gate', status: '', observations: '', remarks: '' },
                        { area: 'Out-Gate', status: '', observations: '', remarks: '' },
                        { area: 'Porch', status: '', observations: '', remarks: '' },
                        { area: 'Valet', status: '', observations: '', remarks: '' }
                    ],
                    coverTally: [
                        { outlet: 'Tattva Spa', morning: '', evening: '' },
                        { outlet: 'Restaurants', morning: '', evening: '' }
                    ],
                    items: {}
                };
                
                AUDIT_QUESTIONS.forEach((q, idx) => {
                    newReport.items[idx] = { status: null, remarks: '', photos: [] };
                });

                this.reports.unshift(newReport);
                this.currentReportId = newReport.id;
                this.saveToLocal();
                this.renderEditor();
                this.showEditor();
            },

            openReport(id) {
                this.currentReportId = id;
                this.renderEditor();
                this.showEditor();
            },

            deleteReport(id, event) {
                event.stopPropagation();
                if(confirm("Are you sure you want to delete this MOD Audit report?")) {
                    this.reports = this.reports.filter(r => r.id !== id);
                    this.saveToLocal();
                    this.renderDashboard();
                }
            },

            getCurrentReport() {
                return this.reports.find(r => r.id === this.currentReportId);
            },

            refreshReport() {
                if(confirm("Are you sure you want to refresh this report? This will clear all current inputs and selections.")) {
                    const report = this.getCurrentReport();
                    if(report) {
                        report.meta = {
                            date: new Date().toISOString().split('T')[0],
                            day: '', modName: '', timeIn: '', timeOut: '', observation: ''
                        };
                        report.generalPhotos = [];
                        report.guestInteractions = [
                            {name: '', room: '', feedback: ''},
                            {name: '', room: '', feedback: ''},
                            {name: '', room: '', feedback: ''}
                        ];
                        report.staffInteractions = [
                            {name: '', dept: '', remarks: ''},
                            {name: '', dept: '', remarks: ''},

            compressAndSanitizeImage(file, callback) {
                if (!file.type.match(/^image\/(jpeg|png|gif|webp)$/)) {
                    alert("Security Alert: Only valid image files are allowed.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        
                        const MAX_WIDTH = 300;
                        const MAX_HEIGHT = 300;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        
                        ctx.drawImage(img, 0, 0, width, height);
                        callback(canvas.toDataURL('image/jpeg', 0.3)); 
                    };
                    img.onerror = function() {
                        alert("Security Alert: The image file is corrupt or invalid.");
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

                    } else if (isCheckInProcess) {
                        if (!report.checkInProcess) {
                            report.checkInProcess = { guestName: '', roomNo: '' };
                        }
                        const checkIn = report.checkInProcess;
                        remarksContentHtml = `
                            <div class="overflow-x-auto w-full mb-3">
                                <table class="w-full md:w-2/3 text-sm text-left border-collapse print:mb-0.5">
                                    <tbody>
                                        <tr class="border border-slate-200 print:border-b">
                                            <th class="p-2 border-r border-slate-200 w-1/3 bg-slate-50 print:p-0.5 print:text-[9px]">Guest Name</th>
                                            <td class="p-1 md:p-2 print:p-0.5">
                                                <input type="text" onchange="app.updateCheckInProcess('guestName', this.value)" value="${escapeHTML(checkIn.guestName)}" class="w-full p-1 outline-none print:hidden" placeholder="Enter Guest Name">
                                                <div class="hidden print:block print:text-[9px] print:leading-tight">${escapeHTML(checkIn.guestName || '-')}</div>
                                            </td>
                                        </tr>
                                        <tr class="border border-slate-200 print:border-b">
                                            <th class="p-2 border-r border-slate-200 w-1/3 bg-slate-50 print:p-0.5 print:text-[9px]">Guest Room No.</th>
                                            <td class="p-1 md:p-2 print:p-0.5">
                                                <input type="text" onchange="app.updateCheckInProcess('roomNo', this.value)" value="${escapeHTML(checkIn.roomNo)}" class="w-full p-1 outline-none print:hidden" placeholder="Enter Room No.">
                                                <div class="hidden print:block print:text-[9px] print:leading-tight">${escapeHTML(checkIn.roomNo || '-')}</div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            
                            <label class="block text-xs font-semibold text-slate-500 uppercase mb-1 print:text-[9px]">Remarks</label>
                            <textarea rows="2" 
                                onchange="app.updateItemRemarks(${index}, this.value)"
                                oninput="this.nextElementSibling.textContent = this.value"
                                placeholder="Add remarks..." 
                                class="w-full text-base sm:text-sm p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-teal-600 focus:border-teal-600 outline-none print:hidden resize-none">${escapeHTML(itemData.remarks)}</textarea>
                            
                            <div class="hidden print:block whitespace-pre-wrap print:text-[9px] print:leading-tight print:pt-0.5">${escapeHTML(itemData.remarks || '')}</div>
                            
                            ${photoActionHtml}
                        `;
                    } else if (isTestCalls) {
                        const calls = report.testCalls || { spring: '', ird: '', mysouth: '', myst: '', onetouch: '' };
                        remarksContentHtml = `
                            <div class="overflow-x-auto w-full">
                                <table class="w-full text-sm text-left border-collapse print:mb-0.5">
                                    <thead class="text-xs text-slate-500 uppercase bg-slate-50 print:hidden">
                                        <tr><th class="p-2 border border-slate-200 w-1/4">Department</th><th class="p-2 border border-slate-200 w-auto">Remarks</th></tr>
                                    </thead>
                                    <tbody>
                                        ${[ {id:'spring',label:'Spring'},{id:'ird',label:'IRD'},{id:'mysouth',label:'Mysouth'},{id:'myst',label:'Myst'},{id:'onetouch',label:'One Touch'} ].map((dept) => `
                                            <tr class="border-b border-slate-200 print:border-none print:border-b">
                                                <td class="p-1 md:p-2 border-r border-slate-200 font-medium text-slate-700 print:p-0.5 print:text-[9px] print:border-r-0">
                                                    ${escapeHTML(dept.label)}
                                                </td>
                                                <td class="p-1 md:p-2 print:p-0.5">
                                                    <textarea rows="1" onchange="app.updateTestCall('${escapeHTML(dept.id)}', this.value)" class="w-full p-1 border border-slate-200 rounded outline-none resize-none print:hidden" placeholder="Add remarks...">${escapeHTML(calls[dept.id] || '')}</textarea>
                                                    <div class="hidden print:block print:text-[9px] print:leading-tight">${escapeHTML(calls[dept.id] || '-')}</div>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            ${photoActionHtml}
                        `;
                    } else if (isCoverTally) {
                        if (!report.coverTally || report.coverTally.length !== 2) {
                            report.coverTally = [
                                { outlet: 'Tattva Spa', morning: '', evening: '' },
                                { outlet: 'Restaurants', morning: '', evening: '' }
                            ];
                        }
                        const tallies = report.coverTally;
                        remarksContentHtml = `
                            <div class="overflow-x-auto w-full">
                                <table class="w-full text-sm text-left border-collapse print:mb-0.5">
                                    <thead class="text-xs text-slate-500 uppercase bg-slate-50 print:hidden">
                                        <tr>
                                            <th class="p-2 border border-slate-200 w-1/4">Area</th>
                                            <th class="p-2 border border-slate-200 w-3/8">Morning</th>
                                            <th class="p-2 border border-slate-200 w-3/8">Evening</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${tallies.map((tally, i) => `
                                            <tr class="border-b border-slate-200 print:border-none print:border-b">
                                                <td class="p-1 md:p-2 border-r border-slate-200 font-bold text-slate-700 print:p-0.5 print:text-[9px] print:border-r-0">
                                                    ${escapeHTML(tally.outlet)}
                                                </td>
                                                <td class="p-1 md:p-2 border-r border-slate-200 print:p-0.5 print:border-r-0">
                                                    <textarea rows="2" onchange="app.updateCoverTally(${i}, 'morning', this.value)" class="w-full p-1 border border-slate-200 rounded outline-none resize-none print:hidden" placeholder="Enter morning remarks...">${escapeHTML(tally.morning)}</textarea>
                                                    <div class="hidden print:block print:text-[9px] print:leading-tight"><b>Morning:</b> ${escapeHTML(tally.morning || '-')}</div>
                                                </td>
                                                <td class="p-1 md:p-2 print:p-0.5">
                                                    <textarea rows="2" onchange="app.updateCoverTally(${i}, 'evening', this.value)" class="w-full p-1 border border-slate-200 rounded outline-none resize-none print:hidden" placeholder="Enter evening remarks...">${escapeHTML(tally.evening)}</textarea>
                                                    <div class="hidden print:block print:text-[9px] print:leading-tight"><b>Evening:</b> ${escapeHTML(tally.evening || '-')}</div>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            ${photoActionHtml}
                        `;
                    } else {
                        // Standard Remarks Box for Normal Audit Questions
                        remarksContentHtml = `
                            <textarea rows="2" 
                                onchange="app.updateItemRemarks(${index}, this.value)"
                                oninput="this.nextElementSibling.textContent = this.value"
                                placeholder="Add remarks..." 
                                class="w-full text-base sm:text-sm p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-teal-600 focus:border-teal-600 outline-none print:hidden resize-none">${escapeHTML(itemData.remarks)}</textarea>
                            
                            <div class="hidden print:block whitespace-pre-wrap print:text-[9px] print:leading-tight print:pt-0.5">${escapeHTML(itemData.remarks || '')}</div>
                            
                            ${photoActionHtml}
                        `;
                    }

                    row.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-start print:gap-0.5">
                            <!-- Question -->
                            <div class="md:col-span-5 pr-0 md:pr-4">
                                <div class="flex items-start flex-wrap gap-y-2 print:gap-y-0.5">
                                    <span class="text-slate-400 text-sm font-bold mr-2 mt-1 print:text-[10px] print:mt-0">${index + 1}.</span>
                                    <span class="text-slate-800 font-medium print:text-[10px] print:leading-tight flex-1">${cleanQuestion}</span>
                                    ${isBackOfHouse ? '<span class="ml-auto md:ml-2 mt-0.5 inline-block text-[10px] font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded border border-rose-200 uppercase tracking-wider whitespace-nowrap print:hidden"><i class="fa-solid fa-camera mr-1"></i>Photo Required</span>' : ''}
                                </div>
                                
                                <!-- Print Only Status Display -->
                                ${hasStatusButtons ? `
                                <div class="hidden print:block mt-2 font-bold text-sm print:mt-0.5 print:text-[10px]">
                                    Status: 
                                    ${isCompliant ? '<span class="text-green-600 border border-green-600 px-1 py-0 rounded">Compliant</span>' : 
                                     isNonCompliant ? '<span class="text-red-600 border border-red-600 px-1 py-0 rounded">Non-Compliant</span>' : 
                                     isNA ? '<span class="text-slate-500 border border-slate-500 px-1 py-0 rounded">N/A</span>' :
                                     '<span class="text-slate-400 border border-slate-300 px-1 py-0 rounded">Not Evaluated</span>'}
                                </div>
                                ` : ''}
                            </div>

                            <!-- Status Buttons (Hidden in Print & Preview, Conditional) -->
                            ${hasStatusButtons ? `
                            <div class="md:col-span-4 flex gap-1.5 sm:gap-2 justify-center no-print">
                                <button onclick="app.updateItemStatus(${index}, 'compliant')" 
                                    class="status-btn flex-1 py-3 md:py-2 px-1 sm:px-2 border border-slate-200 rounded-md text-xs sm:text-sm font-medium transition-colors ${isCompliant ? 'selected-compliant' : 'text-teal-600 hover:bg-slate-100'}">
                                    <i class="fa-solid fa-check mr-1 hidden sm:inline"></i>Yes
                                </button>
                                <button onclick="app.updateItemStatus(${index}, 'non-compliant')" 
                                    class="status-btn flex-1 py-3 md:py-2 px-1 sm:px-2 border border-slate-200 rounded-md text-xs sm:text-sm font-medium transition-colors ${isNonCompliant ? 'selected-non-compliant' : 'text-teal-600 hover:bg-slate-100'}">
                                    <i class="fa-solid fa-xmark mr-1 hidden sm:inline"></i>No
                                </button>
                                <button onclick="app.updateItemStatus(${index}, 'na')" 
                                    class="status-btn flex-1 py-3 md:py-2 px-1 sm:px-2 border border-slate-200 rounded-md text-xs sm:text-sm font-medium transition-colors ${isNA ? 'selected-na' : 'text-slate-500 hover:bg-slate-100'}">
                                    <i class="fa-solid fa-minus mr-1 hidden sm:inline"></i>N/A
                                </button>
                            </div>
                            ` : ''}

                            <!-- Remarks Action -->
                            <div class="${remarksColSpan} flex flex-col gap-2 print:gap-0.5 print:mt-0 print:border-none print:pt-0">
                                ${remarksContentHtml}
                            </div>
                        </div>
                        ${photosHtml}
                    `;
                    
                    container.appendChild(row);
                });
            }
        };

        window.onload = () => {
            app.init();
        };
    </script>
</body>
