<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#e11d48">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Mysouth Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Native App Feel for iOS/Android */
        body {
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        button, input, textarea {
            touch-action: manipulation;
        }

        /* Hide scrollbars for smooth swiping on mobile */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Print media query */
        @media print {
            body { background-color: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-border { border: 1px solid #e5e7eb !important; }
            .print-shadow-none { box-shadow: none !important; }
            .page-break { page-break-before: always; }
            .avoid-break { page-break-inside: avoid; }
            
            /* Clean up inputs for printing */
            input, textarea { 
                border: none !important; 
                background: transparent !important;
                resize: none !important;
                padding: 0 !important;
            }
            input::placeholder, textarea::placeholder { color: transparent !important; }
            
            /* Force background colors to show in print (Chrome/Edge) */
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
        }
        
        /* On-Screen Preview Mode (Mimics print layout) */
        body.preview-mode { background-color: white !important; color: black !important; }
        body.preview-mode .no-print { display: none !important; }
        body.preview-mode .print-only { display: block !important; }
        body.preview-mode .print-border { border: 1px solid #e5e7eb !important; }
        body.preview-mode .print-shadow-none { box-shadow: none !important; }
        body.preview-mode input, body.preview-mode textarea { 
            border: none !important; 
            background: transparent !important;
            resize: none !important;
            padding: 0 !important;
            pointer-events: none; /* Make uneditable */
        }
        body.preview-mode input::placeholder, body.preview-mode textarea::placeholder { color: transparent !important; }
        body.preview-mode .hidden.print\:block { display: block !important; }
        body.preview-mode #exit-preview-btn { display: flex !important; }

        /* Custom toggles */
        .status-btn.selected-compliant { background-color: #10b981; color: white; border-color: #10b981; }
        .status-btn.selected-non-compliant { background-color: #ef4444; color: white; border-color: #ef4444; }
        .status-btn.selected-na { background-color: #64748b; color: white; border-color: #64748b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- Exit Preview Floating Button -->
    <button id="exit-preview-btn" onclick="app.togglePreview()" class="fixed bottom-8 right-8 bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold z-50 transition-transform hover:scale-105 hidden items-center gap-2">
        <i class="fa-solid fa-eye-slash"></i> Exit Preview
    </button>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="max-w-5xl mx-auto p-4 sm:p-6 transition-opacity duration-300">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-10 mt-4 sm:mt-6 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i class="fa-solid fa-bowl-rice text-rose-600"></i>
                    Mysouth Audit
                </h1>
                <p class="text-sm sm:text-base text-slate-500 mt-1">Manage and file your Mysouth restaurant service reports.</p>
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <button onclick="window.location.reload()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 transition-colors shadow-sm">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh
                </button>
                <button onclick="app.createNewReport()" class="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 transition-colors shadow-sm">
                    <i class="fa-solid fa-plus"></i> New Audit
                </button>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-200 bg-slate-50/50">
                <h2 class="text-lg font-semibold text-slate-800">Recent Reports</h2>
            </div>
            
            <div id="empty-state" class="p-12 text-center text-slate-500 flex flex-col items-center hidden">
                <i class="fa-solid fa-folder-open text-5xl text-slate-300 mb-4"></i>
                <p class="text-lg">No audit reports filed yet.</p>
                <p class="text-sm mt-1">Click the "New Audit" button to get started.</p>
            </div>

            <ul id="report-list" class="divide-y divide-slate-100">
                <!-- Reports injected via JS -->
            </ul>
        </div>
    </div>

    <!-- Editor View -->
    <div id="editor-view" class="max-w-5xl mx-auto p-3 sm:p-6 hidden print:p-0 print:max-w-none print:block">
        
        <!-- Top Action Bar (Hidden in Print & Preview) -->
        <div class="no-print flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 sm:mb-6 bg-white p-3 sm:p-4 rounded-xl shadow-sm border border-slate-200 sticky top-0 z-50 gap-3">
            <div class="flex justify-between w-full sm:w-auto items-center">
                <button onclick="app.showDashboard()" class="text-slate-600 hover:text-slate-900 flex items-center gap-2 font-medium transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
                <span id="save-status-mobile" class="text-xs text-slate-400 sm:hidden">Saved locally</span>
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <span id="save-status" class="hidden sm:inline text-sm text-slate-400 mr-2">Saved locally</span>
                <button onclick="app.refreshReport()" class="bg-slate-100 hover:bg-slate-200 text-slate-800 p-2 sm:px-4 sm:py-2 rounded-lg font-medium flex items-center justify-center transition-colors" title="Clear and reset form">
                    <i class="fa-solid fa-arrows-rotate text-slate-500"></i><span class="hidden sm:inline ml-2">Refresh</span>
                </button>
                <button onclick="app.togglePreview()" class="bg-rose-50 hover:bg-rose-100 text-rose-700 px-3 py-2 sm:px-4 sm:py-2 rounded-lg font-medium flex-1 sm:flex-none flex items-center justify-center gap-2 transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-eye"></i> Preview
                </button>
                <button onclick="app.saveReport()" class="bg-slate-100 hover:bg-slate-200 text-slate-800 px-3 py-2 sm:px-4 sm:py-2 rounded-lg font-medium flex-1 sm:flex-none flex items-center justify-center gap-2 transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-save text-slate-500"></i> Save
                </button>
                <button onclick="window.print()" class="bg-rose-600 hover:bg-rose-700 text-white px-3 py-2 sm:px-4 sm:py-2 rounded-lg font-medium w-full sm:w-auto flex items-center justify-center gap-2 transition-colors text-sm sm:text-base mt-1 sm:mt-0">
                    <i class="fa-solid fa-file-pdf"></i> Export PDF
                </button>
            </div>
        </div>

        <!-- Report Header / Metadata -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mb-6 print-shadow-none print-border">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b pb-4 gap-4">
                <h2 class="text-xl sm:text-2xl font-bold text-slate-900">Mysouth Audit Report</h2>
                <!-- Score Display -->
                <div class="w-full sm:w-auto text-center bg-slate-50 rounded-xl p-3 border border-slate-200 min-w-[120px]">
                    <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Audit Score</div>
                    <div id="score-percentage" class="text-2xl font-bold text-slate-800">0%</div>
                    <div id="score-details" class="text-xs text-slate-400 mt-1">0/29 Passed</div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 mb-2">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Date Conducted On</label>
                    <input type="date" id="meta-date" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-rose-600 transition-colors bg-transparent text-slate-800 font-medium text-base" onchange="app.updateMeta('date', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Time</label>
                    <input type="time" id="meta-time" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-rose-600 transition-colors bg-transparent text-slate-800 font-medium text-base" onchange="app.updateMeta('time', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Session</label>
                    <input type="text" id="meta-session" placeholder="e.g. Lunch/Dinner" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-rose-600 transition-colors bg-transparent text-slate-800 font-medium text-base" onchange="app.updateMeta('session', this.value)">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Buffet Manning Name</label>
                    <input type="text" id="meta-manningName" placeholder="Enter name" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-rose-600 transition-colors bg-transparent text-slate-800 font-medium text-base" onchange="app.updateMeta('manningName', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">GSA Name</label>
                    <input type="text" id="meta-gsaName" placeholder="Enter GSA name" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-rose-600 transition-colors bg-transparent text-slate-800 font-medium text-base" onchange="app.updateMeta('gsaName', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">T.No (Table Number)</label>
                    <input type="text" id="meta-tNo" placeholder="Enter table number" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-rose-600 transition-colors bg-transparent text-slate-800 font-medium text-base" onchange="app.updateMeta('tNo', this.value)">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Supervisor & Manager on Shift</label>
                    <input type="text" id="meta-supervisor" placeholder="Enter supervisor/manager" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-rose-600 transition-colors bg-transparent text-slate-800 font-medium text-base" onchange="app.updateMeta('supervisor', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Auditor Name</label>
                    <input type="text" id="meta-auditor" placeholder="Enter auditor name" class="w-full border-b-2 border-slate-200 py-2 focus:outline-none focus:border-rose-600 transition-colors bg-transparent text-slate-800 font-medium text-base" onchange="app.updateMeta('auditor', this.value)">
                </div>
                <div></div> <!-- Spacer -->
            </div>
        </div>

        <!-- Checklist -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print-shadow-none print-border mb-6">
            <div id="checklist-container" class="divide-y divide-slate-100">
                <!-- Checklist items injected via JS -->
            </div>
        </div>

        <!-- Final Observations -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mb-6 print-shadow-none print-border avoid-break">
            <label class="block text-lg font-bold text-slate-900 mb-3">Audit Observation</label>
            <textarea id="meta-observation" rows="4" placeholder="Enter any final overall observations..." class="w-full border border-slate-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-rose-600 transition-all text-base text-slate-800 print:p-0 print:border-none" onchange="app.updateMeta('observation', this.value)"></textarea>
        </div>

        <!-- Hidden Global Item Photo Input -->
        <input type="file" id="item-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleItemPhotoUpload(event)">

    </div>

    <script>
        const AUDIT_QUESTIONS = [
            "Grooming as per standard.",
            "Acknowledging the guest by hostess",
            "Welcome (Namaste, Smile, Eye contact, Tone of voice, Body Language)",
            "Enquiring guest details (Name and Room Number)",
            "If not staying was reservation checked for?",
            "Escorting the guest to the preferred table?",
            "Assisting the guest to sit by pulling the chair",
            "Did the associate removed the napkin ring?",
            "Did the associate get the hand wash bowl?",
            "Did the associate checked for the preference of water?",
            "Did the associate present the beverage menu?",
            "Upselling/ Suggestive selling ( Sides)",
            "Did the team member take beverage order?",
            "Did the team member explain the todays thali menu?",
            "Did the hotel associate have a good working knowledge of the English language and the menu",
            "Did the team member serve the welcome drink(Amuse Bouche)?",
            "Did the associate cleared the show plate?",
            "Did the associate serve the thali on time?",
            "Did the associate explain the thali food?",
            "Did the associate serve the steam rice on table?",
            "Was ghee served with Sambhar?",
            "Did the associate check for re-filling of dishes?",
            "Did the team member serve the desert?",
            "Was the bill presented in a proper way?",
            "Was after mints offered to guest?",
            "Did the associate give the Bot shot Tab to the guest?",
            "Did the hotel associate maintain eye contact with the guest?",
            "Was there an interaction between the guest and the associate?",
            "Staff should demonstrate a Yes I Can! service attitude at all times"
        ];

        const app = {
            reports: [],
            currentReportId: null,
            
            init() {
                // Unique key for the Mobile Mysouth Audits
                const stored = localStorage.getItem('hotelMysouthAuditsV2');
                if (stored) {
                    try {
                        this.reports = JSON.parse(stored);
                    } catch (e) {
                        console.error("Could not parse stored reports.");
                    }
                }
                this.renderDashboard();
            },

            saveToLocal() {
                localStorage.setItem('hotelMysouthAuditsV2', JSON.stringify(this.reports));
                
                const statusIndicator = document.getElementById('save-status');
                const statusIndicatorMobile = document.getElementById('save-status-mobile');
                
                if(statusIndicator) statusIndicator.textContent = "Saving...";
                if(statusIndicatorMobile) statusIndicatorMobile.textContent = "Saving...";
                
                setTimeout(() => {
                    if(statusIndicator) statusIndicator.textContent = "Saved locally";
                    if(statusIndicatorMobile) statusIndicatorMobile.textContent = "Saved locally";
                }, 1000);
            },

            showDashboard() {
                document.body.classList.remove('preview-mode');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('editor-view').classList.add('hidden');
                this.currentReportId = null;
                this.renderDashboard();
            },

            showEditor() {
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            togglePreview() {
                document.body.classList.toggle('preview-mode');
                window.scrollTo(0, 0);
            },

            createNewReport() {
                const newReport = {
                    id: Date.now().toString(),
                    meta: {
                        date: new Date().toISOString().split('T')[0],
                        time: '',
                        session: '',
                        manningName: '',
                        gsaName: '',
                        tNo: '',
                        supervisor: '',
                        auditor: '',
                        observation: ''
                    },
                    items: {} // Will hold { index: { status: 'compliant'|'non-compliant'|'na'|null, remarks: '', photos: [] } }
                };
                
                // Initialize items
                AUDIT_QUESTIONS.forEach((q, idx) => {
                    newReport.items[idx] = { status: null, remarks: '', photos: [] };
                });

                this.reports.unshift(newReport);
                this.currentReportId = newReport.id;
                this.saveToLocal();
                this.renderEditor();
                this.showEditor();
            },

            openReport(id) {
                this.currentReportId = id;
                this.renderEditor();
                this.showEditor();
            },

            preventDelete(event, daysRemaining) {
                event.stopPropagation();
                alert(`Reports must be retained for 30 days. You can delete this report in ${daysRemaining} day(s).`);
            },

            deleteReport(id, event) {
                event.stopPropagation();
                
                const report = this.reports.find(r => r.id === id);
                if (!report) return;

                // Secondary Validation to ensure deletion isn't forced manually 
                const reportTimestamp = parseInt(report.id);
                const ageInMs = Date.now() - reportTimestamp;
                const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;

                if (ageInMs < THIRTY_DAYS_MS) {
                    const daysRemaining = Math.ceil((THIRTY_DAYS_MS - ageInMs) / (1000 * 60 * 60 * 24));
                    alert(`Access Denied: Reports are retained for 30 days. You can delete this report in ${daysRemaining} day(s).`);
                    return;
                }

                if(confirm("Are you sure you want to delete this audit report? This action cannot be undone.")) {
                    this.reports = this.reports.filter(r => r.id !== id);
                    this.saveToLocal();
                    this.renderDashboard();
                }
            },

            getCurrentReport() {
                return this.reports.find(r => r.id === this.currentReportId);
            },

            refreshReport() {
                if(confirm("Are you sure you want to refresh this report? This will clear all current inputs and selections.")) {
                    const report = this.getCurrentReport();
                    if(report) {
                        report.meta = {
                            date: new Date().toISOString().split('T')[0],
                            time: '', session: '', manningName: '', gsaName: '', tNo: '', supervisor: '', auditor: '', observation: ''
                        };
                        AUDIT_QUESTIONS.forEach((q, idx) => {
                            report.items[idx] = { status: null, remarks: '', photos: [] };
                        });
                        this.saveToLocal();
                        this.renderEditor();
                    }
                }
            },

            calculateScore(report) {
                let compliant = 0;
                let nonCompliant = 0;
                let na = 0;
                const totalItems = AUDIT_QUESTIONS.length;
                
                for (let i = 0; i < totalItems; i++) {
                    if (report.items[i]) {
                        if (report.items[i].status === 'compliant') compliant++;
                        if (report.items[i].status === 'non-compliant') nonCompliant++;
                        if (report.items[i].status === 'na') na++;
                    }
                }
                
                const totalApplicable = totalItems - na;
                const percentage = totalApplicable === 0 ? 0 : Math.round((compliant / totalApplicable) * 100);
                
                return { compliant, nonCompliant, na, total: totalApplicable, percentage };
            },

            updateScoreUI() {
                const report = this.getCurrentReport();
                if (!report) return;
                const score = this.calculateScore(report);
                
                const pctEl = document.getElementById('score-percentage');
                const detEl = document.getElementById('score-details');
                if (pctEl && detEl) {
                    pctEl.textContent = `${score.percentage}%`;
                    detEl.textContent = `${score.compliant}/${score.total} Passed`;
                    
                    // Update color based on score
                    pctEl.className = `text-2xl font-bold ${score.percentage >= 80 ? 'text-green-600' : score.percentage >= 50 ? 'text-amber-500' : 'text-red-600'}`;
                }
            },

            updateMeta(field, value) {
                const report = this.getCurrentReport();
                if (report) {
                    report.meta[field] = value;
                    this.saveToLocal();
                }
            },

            updateItemStatus(index, status) {
                const report = this.getCurrentReport();
                if (report) {
                    // Toggle off if clicking the already selected status
                    report.items[index].status = (report.items[index].status === status) ? null : status;
                    this.saveToLocal();
                    this.renderChecklist(); // Re-render just the checklist part
                    this.updateScoreUI(); // Update the score display
                }
            },

            updateItemRemarks(index, value) {
                const report = this.getCurrentReport();
                if (report) {
                    report.items[index].remarks = value;
                    this.saveToLocal();
                }
            },

            saveReport() {
                this.saveToLocal();
                alert("Draft saved successfully.");
            },

            currentUploadIndex: null,

            triggerPhotoUpload(index) {
                this.currentUploadIndex = index;
                document.getElementById('item-photo-upload').value = '';
                document.getElementById('item-photo-upload').click();
            },

            compressImage(file, callback) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        // Aggressive compression for < 3MB PDF size even with many photos
                        const MAX_WIDTH = 400;
                        const MAX_HEIGHT = 400;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Compress to 40% quality JPEG
                        callback(canvas.toDataURL('image/jpeg', 0.4)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

            handleItemPhotoUpload(event) {
                const files = event.target.files;
                if (!files || files.length === 0 || this.currentUploadIndex === null) return;
                
                const report = this.getCurrentReport();
                if (!report) return;
                
                if (!report.items[this.currentUploadIndex].photos) {
                    report.items[this.currentUploadIndex].photos = [];
                }

                Array.from(files).forEach(file => {
                    this.compressImage(file, (base64Img) => {
                        report.items[this.currentUploadIndex].photos.push(base64Img);
                        this.saveToLocal();
                        this.renderChecklist();
                    });
                });
            },

            removeItemPhoto(itemIndex, photoIndex) {
                if(confirm("Are you sure you want to remove this photo?")) {
                    const report = this.getCurrentReport();
                    if (report && report.items[itemIndex].photos) {
                        report.items[itemIndex].photos.splice(photoIndex, 1);
                        this.saveToLocal();
                        this.renderChecklist();
                    }
                }
            },

            renderDashboard() {
                const list = document.getElementById('report-list');
                const emptyState = document.getElementById('empty-state');
                
                list.innerHTML = '';
                
                if (this.reports.length === 0) {
                    emptyState.classList.remove('hidden');
                    list.classList.add('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');
                list.classList.remove('hidden');

                const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;

                this.reports.forEach(report => {
                    const sessionInfo = report.meta.session || "No Session";
                    const tableInfo = report.meta.tNo ? `Table ${report.meta.tNo}` : "No Table";
                    const date = report.meta.date || "No Date";
                    const score = this.calculateScore(report);
                    const scoreColorClass = score.percentage >= 80 ? 'text-green-700 bg-green-100' : score.percentage >= 50 ? 'text-amber-700 bg-amber-100' : 'text-red-700 bg-red-100';
                    
                    // Retention Check Logic
                    const reportTimestamp = parseInt(report.id);
                    const ageInMs = Date.now() - reportTimestamp;
                    const canDelete = ageInMs >= THIRTY_DAYS_MS;
                    const daysRemaining = Math.ceil((THIRTY_DAYS_MS - ageInMs) / (1000 * 60 * 60 * 24));

                    const deleteBtnHtml = canDelete 
                        ? `<button onclick="app.deleteReport('${report.id}', event)" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100" title="Delete Report">
                                <i class="fa-solid fa-trash"></i>
                           </button>`
                        : `<button onclick="app.preventDelete(event, ${daysRemaining})" class="p-2 text-slate-200 cursor-not-allowed opacity-0 group-hover:opacity-100 focus:opacity-100" title="Retained for 30 days (${daysRemaining} days left)">
                                <i class="fa-solid fa-trash"></i>
                           </button>`;

                    const li = document.createElement('li');
                    li.className = "p-4 hover:bg-slate-50 cursor-pointer transition-colors flex items-center justify-between group";
                    li.onclick = () => this.openReport(report.id);
                    
                    li.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="bg-rose-100 p-3 rounded-lg text-rose-600">
                                <i class="fa-solid fa-bowl-rice text-xl"></i>
                            </div>
                            <div>
                                <h3 class="font-semibold text-slate-900 text-lg">
                                    ${sessionInfo} - ${tableInfo}
                                </h3>
                                <div class="flex items-center gap-3 text-sm text-slate-500 mt-1">
                                    <span class="px-2 py-0.5 rounded font-bold ${scoreColorClass}">${score.percentage}% Score</span>
                                    <span><i class="fa-regular fa-calendar mr-1"></i> ${date}</span>
                                    ${report.meta.auditor ? `<span>•</span><span>Auditor: ${report.meta.auditor}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        ${deleteBtnHtml}
                    `;
                    list.appendChild(li);
                });
            },

            renderEditor() {
                const report = this.getCurrentReport();
                if (!report) return;

                // Populate Metadata
                document.getElementById('meta-date').value = report.meta.date || '';
                document.getElementById('meta-time').value = report.meta.time || '';
                document.getElementById('meta-session').value = report.meta.session || '';
                document.getElementById('meta-manningName').value = report.meta.manningName || '';
                document.getElementById('meta-gsaName').value = report.meta.gsaName || '';
                document.getElementById('meta-tNo').value = report.meta.tNo || '';
                document.getElementById('meta-supervisor').value = report.meta.supervisor || '';
                document.getElementById('meta-auditor').value = report.meta.auditor || '';
                document.getElementById('meta-observation').value = report.meta.observation || '';

                this.renderChecklist();
                this.updateScoreUI();
            },

            renderChecklist() {
                const report = this.getCurrentReport();
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';

                AUDIT_QUESTIONS.forEach((question, index) => {
                    const itemData = report.items[index] || { status: null, remarks: '', photos: [] };
                    if (!itemData.photos) itemData.photos = [];
                    
                    const isCompliant = itemData.status === 'compliant';
                    const isNonCompliant = itemData.status === 'non-compliant';
                    const isNA = itemData.status === 'na';

                    const row = document.createElement('div');
                    row.className = "p-4 sm:p-6 hover:bg-slate-50/50 transition-colors avoid-break border-b border-slate-100 last:border-0";
                    
                    let photosHtml = '';
                    if (itemData.photos.length > 0) {
                        photosHtml = `
                            <div class="mt-4 flex gap-3 overflow-x-auto pb-2 hide-scrollbar touch-pan-x">
                                ${itemData.photos.map((p, pIdx) => `
                                    <div class="relative group shrink-0 w-24 h-24 rounded border border-slate-200 overflow-hidden print:w-20 print:h-20 print:border-slate-300">
                                        <img src="${p}" class="w-full h-full object-cover">
                                        <button onclick="app.removeItemPhoto(${index}, ${pIdx})" class="no-print absolute top-1 right-1 bg-red-500 hover:bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">
                                            <i class="fa-solid fa-xmark text-xs"></i>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }

                    row.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-start">
                            <!-- Question -->
                            <div class="md:col-span-5 pr-0 md:pr-4">
                                <span class="text-slate-400 text-sm font-bold mr-2">${index + 1}.</span>
                                <span class="text-slate-800 font-medium">${question}</span>
                                
                                <!-- Print Only Status Display -->
                                <div class="hidden print:block mt-2 font-bold text-sm">
                                    Status: 
                                    ${isCompliant ? '<span class="text-green-600 border border-green-600 px-2 py-0.5 rounded">Compliant</span>' : 
                                     isNonCompliant ? '<span class="text-red-600 border border-red-600 px-2 py-0.5 rounded">Non-Compliant</span>' : 
                                     isNA ? '<span class="text-slate-500 border border-slate-500 px-2 py-0.5 rounded">N/A</span>' :
                                     '<span class="text-slate-400 border border-slate-300 px-2 py-0.5 rounded">Not Evaluated</span>'}
                                </div>
                            </div>

                            <!-- Status Buttons (Hidden in Print & Preview) -->
                            <div class="md:col-span-4 flex gap-1.5 sm:gap-2 justify-center no-print">
                                <button onclick="app.updateItemStatus(${index}, 'compliant')" 
                                    class="status-btn flex-1 py-3 md:py-2 px-1 sm:px-2 border border-slate-200 rounded-md text-xs sm:text-sm font-medium transition-colors ${isCompliant ? 'selected-compliant' : 'text-rose-600 hover:bg-slate-100'}">
                                    <i class="fa-solid fa-check mr-1 hidden sm:inline"></i>Yes
                                </button>
                                <button onclick="app.updateItemStatus(${index}, 'non-compliant')" 
                                    class="status-btn flex-1 py-3 md:py-2 px-1 sm:px-2 border border-slate-200 rounded-md text-xs sm:text-sm font-medium transition-colors ${isNonCompliant ? 'selected-non-compliant' : 'text-rose-600 hover:bg-slate-100'}">
                                    <i class="fa-solid fa-xmark mr-1 hidden sm:inline"></i>No
                                </button>
                                <button onclick="app.updateItemStatus(${index}, 'na')" 
                                    class="status-btn flex-1 py-3 md:py-2 px-1 sm:px-2 border border-slate-200 rounded-md text-xs sm:text-sm font-medium transition-colors ${isNA ? 'selected-na' : 'text-slate-500 hover:bg-slate-100'}">
                                    <i class="fa-solid fa-minus mr-1 hidden sm:inline"></i>N/A
                                </button>
                            </div>

                            <!-- Remarks & Evidence Action -->
                            <div class="md:col-span-3 flex flex-col gap-2">
                                <textarea rows="2" 
                                    onchange="app.updateItemRemarks(${index}, this.value)"
                                    placeholder="Add remarks..." 
                                    class="w-full text-base sm:text-sm p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-rose-600 focus:border-rose-600 outline-none print:p-0 print:border-none print:bg-transparent print:resize-none">${itemData.remarks}</textarea>
                                
                                <button onclick="app.triggerPhotoUpload(${index})" class="no-print mt-1 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 sm:py-2 px-3 rounded text-sm sm:text-xs font-medium flex items-center justify-center gap-1.5 transition-colors border border-slate-200">
                                    <i class="fa-solid fa-camera"></i> Attach Evidence
                                </button>
                            </div>
                        </div>
                        ${photosHtml}
                    `;
                    
                    container.appendChild(row);
                });
            }
        };

        // Initialize application on load
        window.onload = () => {
            app.init();
        };
    </script>
</body>
</html>
