<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Spring Audit Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Native App Feel for iOS/Android */
        body {
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        button, input, textarea {
            touch-action: manipulation;
        }

        /* Hide scrollbars for smooth swiping on mobile */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Print media query */
        @media print {
            body { background-color: white !important; color: black !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-border { border: 1px solid #e5e7eb !important; }
            .print-shadow-none { box-shadow: none !important; }
            .page-break { page-break-before: always; }
            .avoid-break { page-break-inside: avoid; }
            
            /* Clean up inputs for printing */
            input, textarea { 
                border: none !important; 
                background: transparent !important;
                resize: none !important;
                padding: 0 !important;
            }
            input::placeholder, textarea::placeholder { color: transparent !important; }
            
            /* Force background colors to show in print (Chrome/Edge) */
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
        }
        
        /* On-Screen Preview Mode (Mimics print layout) */
        body.preview-mode { background-color: white !important; color: black !important; }
        body.preview-mode .no-print { display: none !important; }
        body.preview-mode .print-only { display: block !important; }
        body.preview-mode .print-border { border: 1px solid #e5e7eb !important; }
        body.preview-mode .print-shadow-none { box-shadow: none !important; }
        body.preview-mode input, body.preview-mode textarea { 
            border: none !important; 
            background: transparent !important;
            resize: none !important;
            padding: 0 !important;
            pointer-events: none; /* Make uneditable */
        }
        body.preview-mode input::placeholder, body.preview-mode textarea::placeholder { color: transparent !important; }
        body.preview-mode .hidden.print\:block { display: block !important; }
        body.preview-mode .print\:hidden { display: none !important; } /* Fix for textarea mirroring */
        body.preview-mode #exit-preview-btn { display: flex !important; }

        /* Custom toggles */
        .status-btn.selected-compliant { background-color: #10b981; color: white; border-color: #10b981; }
        .status-btn.selected-non-compliant { background-color: #ef4444; color: white; border-color: #ef4444; }
        .status-btn.selected-na { background-color: #64748b; color: white; border-color: #64748b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- Exit Preview Floating Button -->
    <button id="exit-preview-btn" onclick="app.togglePreview()" class="fixed bottom-8 right-8 bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold z-50 transition-transform hover:scale-105 hidden items-center gap-2">
        <i class="fa-solid fa-eye-slash"></i> Exit Preview
    </button>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="max-w-5xl mx-auto p-4 sm:p-6 transition-opacity duration-300">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-10 mt-4 sm:mt-6 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i class="fa-solid fa-utensils text-indigo-600"></i>
                    Spring Audit Checklist
                </h1>
                <p class="text-sm sm:text-base text-slate-500 mt-1">Manage and file your Spring Restaurant service and quality audits.</p>
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <button onclick="window.location.reload()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 transition-colors shadow-sm">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh
                </button>
                <button onclick="app.createNewReport()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-medium flex-1 sm:flex-none justify-center flex items-center gap-2 transition-colors shadow-sm">
                    <i class="fa-solid fa-plus"></i> New Spring Audit
                </button>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-200 bg-slate-50/50">
                <h2 class="text-lg font-semibold text-slate-800">Recent Reports</h2>
            </div>
            
            <div id="empty-state" class="p-12 text-center text-slate-500 flex flex-col items-center hidden">
                <i class="fa-solid fa-folder-open text-5xl text-slate-300 mb-4"></i>
                <p class="text-lg">No audit reports filed yet.</p>
                <p class="text-sm mt-1">Click the "New Spring Audit" button to get started.</p>
            </div>

            <ul id="report-list" class="divide-y divide-slate-100">
                <!-- Reports injected via JS -->
            </ul>
        </div>
    </div>

    <!-- Editor View -->
    <div id="editor-view" class="max-w-5xl mx-auto p-3 sm:p-6 hidden print:p-0 print:max-w-none print:block">
        
        <!-- Top Action Bar (Hidden in Print & Preview) -->
        <div class="no-print flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 sm:mb-6 bg-white p-3 sm:p-4 rounded-xl shadow-sm border border-slate-200 sticky top-0 z-50 gap-3">
            <div class="flex justify-between w-full sm:w-auto items-center">
                <button onclick="app.showDashboard()" class="text-slate-600 hover:text-slate-900 flex items-center gap-2 font-medium transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
                <span id="save-status-mobile" class="text-xs text-slate-400 sm:hidden">Saved locally</span>
            </div>
            <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                <span id="save-status" class="hidden sm:inline text-sm text-slate-400 mr-2">Saved locally</span>
                <button onclick="app.refreshReport()" class="bg-slate-100 hover:bg-slate-200 text-slate-800 p-2 sm:px-4 sm:py-2 rounded-lg font-medium flex items-center justify-center transition-colors" title="Clear and reset form">
                    <i class="fa-solid fa-arrows-rotate text-slate-500"></i><span class="hidden sm:inline ml-2">Refresh</span>
                </button>
                <button onclick="app.togglePreview()" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-2 sm:px-4 sm:py-2 rounded-lg font-medium flex-1 sm:flex-none flex items-center justify-center gap-2 transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-eye"></i> Preview
                </button>
                <button onclick="app.saveReport()" class="bg-slate-100 hover:bg-slate-200 text-slate-800 px-3 py-2 sm:px-4 sm:py-2 rounded-lg font-medium flex-1 sm:flex-none flex items-center justify-center gap-2 transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-save text-slate-500"></i> Save
                </button>
                <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 sm:px-4 sm:py-2 rounded-lg font-medium w-full sm:w-auto flex items-center justify-center gap-2 transition-colors text-sm sm:text-base mt-1 sm:mt-0">
                    <i class="fa-solid fa-file-pdf"></i> Export PDF
                </button>
            </div>
        </div>

        <!-- Report Header / Metadata -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6 mb-6 print-shadow-none print-border">
            <div class="mb-4 border-b pb-3">
                <h2 class="text-xl sm:text-2xl font-bold text-slate-900">Spring Audit Report</h2>
            </div>
            
            <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-3 sm:gap-4 mb-1">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Date</label>
                    <input type="date" id="meta-date" class="w-full border-b border-slate-200 py-1.5 focus:outline-none focus:border-indigo-600 transition-colors bg-transparent text-slate-800 font-medium text-sm" onchange="app.updateMeta('date', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Time</label>
                    <input type="time" id="meta-time" class="w-full border-b border-slate-200 py-1.5 focus:outline-none focus:border-indigo-600 transition-colors bg-transparent text-slate-800 font-medium text-sm" onchange="app.updateMeta('time', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Session</label>
                    <input type="text" id="meta-session" placeholder="Lunch/Dinner" class="w-full border-b border-slate-200 py-1.5 focus:outline-none focus:border-indigo-600 transition-colors bg-transparent text-slate-800 font-medium text-sm" onchange="app.updateMeta('session', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Guest Name</label>
                    <input type="text" id="meta-guestName" placeholder="Name" class="w-full border-b border-slate-200 py-1.5 focus:outline-none focus:border-indigo-600 transition-colors bg-transparent text-slate-800 font-medium text-sm" onchange="app.updateMeta('guestName', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Room/Table</label>
                    <input type="text" id="meta-roomNo" placeholder="No." class="w-full border-b border-slate-200 py-1.5 focus:outline-none focus:border-indigo-600 transition-colors bg-transparent text-slate-800 font-medium text-sm" onchange="app.updateMeta('roomNo', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">GSA Name</label>
                    <input type="text" id="meta-gsaName" placeholder="Name" class="w-full border-b border-slate-200 py-1.5 focus:outline-none focus:border-indigo-600 transition-colors bg-transparent text-slate-800 font-medium text-sm" onchange="app.updateMeta('gsaName', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Supervisor</label>
                    <input type="text" id="meta-supervisor" placeholder="Name" class="w-full border-b border-slate-200 py-1.5 focus:outline-none focus:border-indigo-600 transition-colors bg-transparent text-slate-800 font-medium text-sm" onchange="app.updateMeta('supervisor', this.value)">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Auditor</label>
                    <input type="text" id="meta-auditorName" placeholder="Name" class="w-full border-b border-slate-200 py-1.5 focus:outline-none focus:border-indigo-600 transition-colors bg-transparent text-slate-800 font-medium text-sm" onchange="app.updateMeta('auditorName', this.value)">
                </div>
            </div>
        </div>

        <!-- Checklist -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print-shadow-none print-border mb-6">
            <div id="checklist-container">
                <!-- Checklist items injected via JS -->
            </div>
        </div>

        <!-- Final Observations -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-8 mb-6 print-shadow-none print-border avoid-break">
            <div class="flex justify-between items-center mb-3">
                <label class="block text-lg font-bold text-slate-900">General Audit Observation</label>
                <button onclick="app.triggerGeneralPhotoUpload()" class="no-print bg-slate-100 hover:bg-slate-200 text-slate-700 py-1.5 px-3 rounded text-sm font-medium flex items-center justify-center gap-1.5 transition-colors border border-slate-200">
                    <i class="fa-solid fa-camera"></i> Attach Photos
                </button>
            </div>
            <textarea id="meta-observation" rows="5" placeholder="Enter any final overall observations..." class="w-full border border-slate-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-indigo-600 transition-all text-base text-slate-800 print:hidden" onchange="app.updateMeta('observation', this.value)"></textarea>
            
            <!-- Mirror Div for Print (Guarantees text won't be cut off in PDF export) -->
            <div id="print-meta-observation" class="hidden print:block w-full text-base text-slate-800 whitespace-pre-wrap min-h-[100px]"></div>
            
            <!-- General Photos Container -->
            <div id="general-photos-container" class="mt-4 flex gap-3 overflow-x-auto pb-2 hide-scrollbar touch-pan-x empty:hidden">
                <!-- General Photos injected via JS -->
            </div>
        </div>

        <!-- Hidden Global Observation Photo Input -->
        <input type="file" id="general-photo-upload" accept="image/*" multiple class="hidden" onchange="app.handleGeneralPhotoUpload(event)">

    </div>

    <script>
        const AUDIT_QUESTIONS = [
            "[Spring Audit] Has the individual maintained the required level of grooming throughout the shift?",
            "[Spring Audit] Was eye contact successfully established during the greeting process?",
            "[Spring Audit] Did the GSA initiate the greeting with a Namaste gesture and a visible smile?",
            "[Spring Audit] Did the hostess enquire guest details (Name & Room number if applicable or for reservation)?",
            "[Spring Audit] Did the GRE escort the guest to the preferred table?",
            "[Spring Audit] Assisting the guest to sit by pulling the chair?",
            "[Spring Audit] Was the table set with cutlery, crockery & glassware?",
            "[Spring Audit] Preference of water?",
            "[Spring Audit] Was buffet orientation carried out for guest?",
            "[Spring Audit] Presenting the food & beverage Menu (QR CODE)?",
            "[Spring Audit] Was beverage menu explained?",
            "[Spring Audit] Time taken for service of beverage (Time)?",
            "[Spring Audit] Whether the beverage name was announced before serving on the table?",
            "[Spring Audit] Whether the name of the food was announced when brought on table?",
            "[Spring Audit] Check with the guest to ensure he/she is happy with the food.",
            "[Spring Audit] Checking for re-fill of beverages or bottle water.",
            "[Spring Audit] Was bill prepared on time?",
            "[Spring Audit] Was clearance done on time?",
            "[Spring Audit] Body Language during the service.",
            "[Spring Audit] Was there an interaction between the guest and the associate?",
            "[Spring Audit] Was the live kitchen area and kitchen kept clean and tidy at all times?",
            "[Spring Audit] Did the hotel associate have a good working knowledge of the English language and the menu?",
            "[Spring Audit] Followed sequence of service all time.",
            "[Spring Audit] Attentive observation of the table throughout their meal time.",
            "[Spring Audit] Was botshot comment card given?",
            "[Spring Audit] Did the team member take the effort to ask for ReviewPro / TripAdvisor / Zomato for reviews?",
            "[Spring Audit] Farewell (Thank the guest, Invitation to visit us again)."
        ];

        const app = {
            reports: [],
            currentReportId: null,
            
            init() {
                // Unique key for the Spring Audits
                const stored = localStorage.getItem('hotelSpringAuditsV1');
                if (stored) {
                    try {
                        const allReports = JSON.parse(stored);
                        // Filter out old audit dated 06-03-26 (2026-03-06) and 11-03-26 (2026-03-11)
                        const filteredReports = allReports.filter(r => 
                            r.meta.date !== '2026-03-06' && 
                            r.meta.date !== '2026-03-11'
                        );
                        this.reports = filteredReports;
                        
                        if (allReports.length !== filteredReports.length) {
                            this.saveToLocal();
                        }
                    } catch (e) {
                        console.error("Could not parse stored reports.");
                    }
                }
                this.renderDashboard();
            },

            saveToLocal() {
                localStorage.setItem('hotelSpringAuditsV1', JSON.stringify(this.reports));
                
                const statusIndicator = document.getElementById('save-status');
                const statusIndicatorMobile = document.getElementById('save-status-mobile');
                
                if(statusIndicator) statusIndicator.textContent = "Saving...";
                if(statusIndicatorMobile) statusIndicatorMobile.textContent = "Saving...";
                
                setTimeout(() => {
                    if(statusIndicator) statusIndicator.textContent = "Saved locally";
                    if(statusIndicatorMobile) statusIndicatorMobile.textContent = "Saved locally";
                }, 1000);
            },

            showDashboard() {
                document.body.classList.remove('preview-mode');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('editor-view').classList.add('hidden');
                this.currentReportId = null;
                this.renderDashboard();
            },

            showEditor() {
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('editor-view').classList.remove('hidden');
            },

            togglePreview() {
                document.body.classList.toggle('preview-mode');
                window.scrollTo(0, 0);
            },

            createNewReport() {
                const newReport = {
                    id: Date.now().toString(),
                    meta: {
                        date: new Date().toISOString().split('T')[0],
                        time: '',
                        session: '',
                        guestName: '',
                        roomNo: '',
                        gsaName: '',
                        supervisor: '',
                        auditorName: '',
                        observation: ''
                    },
                    generalPhotos: [],
                    items: {} // Will hold { index: { status: 'compliant'|'non-compliant'|'na'|null, remarks: '', photos: [] } }
                };
                
                // Initialize items
                AUDIT_QUESTIONS.forEach((q, idx) => {
                    newReport.items[idx] = { status: null, remarks: '', photos: [] };
                });

                this.reports.unshift(newReport);
                this.currentReportId = newReport.id;
                this.saveToLocal();
                this.renderEditor();
                this.showEditor();
            },

            openReport(id) {
                this.currentReportId = id;
                this.renderEditor();
                this.showEditor();
            },

            preventDelete(event, daysRemaining) {
                event.stopPropagation();
                alert(`Reports must be retained for 30 days. You can delete this report in ${daysRemaining} day(s).`);
            },

            deleteReport(id, event) {
                event.stopPropagation();
                const report = this.reports.find(r => r.id === id);
                if (!report) return;

                const reportTimestamp = parseInt(report.id);
                const ageInMs = Date.now() - reportTimestamp;
                const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;

                if (ageInMs < THIRTY_DAYS_MS) {
                    const daysRemaining = Math.ceil((THIRTY_DAYS_MS - ageInMs) / (1000 * 60 * 60 * 24));
                    this.preventDelete(event, daysRemaining);
                    return;
                }

                if(confirm("Are you sure you want to delete this Spring Audit report? This action cannot be undone.")) {
                    this.reports = this.reports.filter(r => r.id !== id);
                    this.saveToLocal();
                    this.renderDashboard();
                }
            },

            getCurrentReport() {
                return this.reports.find(r => r.id === this.currentReportId);
            },

            refreshReport() {
                if(confirm("Are you sure you want to refresh this report? This will clear all current inputs and selections.")) {
                    const report = this.getCurrentReport();
                    if(report) {
                        report.meta = {
                            date: new Date().toISOString().split('T')[0],
                            time: '', session: '', guestName: '', roomNo: '', 
                            gsaName: '', supervisor: '', auditorName: '', observation: ''
                        };
                        report.generalPhotos = [];
                        AUDIT_QUESTIONS.forEach((q, idx) => {
                            report.items[idx] = { status: null, remarks: '', photos: [] };
                        });
                        this.saveToLocal();
                        this.renderEditor();
                    }
                }
            },

            updateMeta(field, value) {
                const report = this.getCurrentReport();
                if (report) {
                    report.meta[field] = value;
                    if (field === 'observation') {
                        document.getElementById('print-meta-observation').textContent = value;
                    }
                    this.saveToLocal();
                }
            },

            updateItemStatus(index, status) {
                const report = this.getCurrentReport();
                if (report) {
                    // Toggle off if clicking the already selected status
                    report.items[index].status = (report.items[index].status === status) ? null : status;
                    this.saveToLocal();
                    this.renderChecklist(); // Re-render just the checklist part
                }
            },

            updateItemRemarks(index, value) {
                const report = this.getCurrentReport();
                if (report) {
                    report.items[index].remarks = value;
                    this.saveToLocal();
                }
            },

            saveReport() {
                this.saveToLocal();
                alert("Draft saved successfully.");
            },

            // --- PHOTO COMPRESSION AND UPLOAD LOGIC ---
            compressImage(file, callback) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        // Aggressive compression for < 3MB PDF size even with many photos
                        const MAX_WIDTH = 400;
                        const MAX_HEIGHT = 400;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Compress to 40% quality JPEG
                        callback(canvas.toDataURL('image/jpeg', 0.4)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

            // 1. Checklist Item Photos
            currentUploadIndex: null,

            triggerPhotoUpload(index) {
                this.currentUploadIndex = index;
                document.getElementById('item-photo-upload').value = '';
                document.getElementById('item-photo-upload').click();
            },

            handleItemPhotoUpload(event) {
                const files = event.target.files;
                if (!files || files.length === 0 || this.currentUploadIndex === null) return;
                
                const report = this.getCurrentReport();
                if (!report) return;
                
                if (!report.items[this.currentUploadIndex].photos) {
                    report.items[this.currentUploadIndex].photos = [];
                }

                Array.from(files).forEach(file => {
                    this.compressImage(file, (base64Img) => {
                        report.items[this.currentUploadIndex].photos.push(base64Img);
                        this.saveToLocal();
                        this.renderChecklist();
                    });
                });
            },

            removeItemPhoto(itemIndex, photoIndex) {
                if(confirm("Are you sure you want to remove this photo?")) {
                    const report = this.getCurrentReport();
                    if (report && report.items[itemIndex].photos) {
                        report.items[itemIndex].photos.splice(photoIndex, 1);
                        this.saveToLocal();
                        this.renderChecklist();
                    }
                }
            },

            // 2. General Observation Photos
            triggerGeneralPhotoUpload() {
                document.getElementById('general-photo-upload').value = '';
                document.getElementById('general-photo-upload').click();
            },

            handleGeneralPhotoUpload(event) {
                const files = event.target.files;
                if (!files || files.length === 0) return;
                
                const report = this.getCurrentReport();
                if (!report) return;
                
                if (!report.generalPhotos) {
                    report.generalPhotos = [];
                }

                Array.from(files).forEach(file => {
                    this.compressImage(file, (base64Img) => {
                        report.generalPhotos.push(base64Img);
                        this.saveToLocal();
                        this.renderGeneralPhotos();
                    });
                });
            },

            removeGeneralPhoto(photoIndex) {
                if(confirm("Are you sure you want to remove this general observation photo?")) {
                    const report = this.getCurrentReport();
                    if (report && report.generalPhotos) {
                        report.generalPhotos.splice(photoIndex, 1);
                        this.saveToLocal();
                        this.renderGeneralPhotos();
                    }
                }
            },

            renderGeneralPhotos() {
                const report = this.getCurrentReport();
                const container = document.getElementById('general-photos-container');
                container.innerHTML = '';
                
                if (report && report.generalPhotos && report.generalPhotos.length > 0) {
                    container.innerHTML = report.generalPhotos.map((p, pIdx) => `
                        <div class="relative group shrink-0 w-28 h-28 rounded border border-slate-200 overflow-hidden print:w-24 print:h-24 print:border-slate-300">
                            <img src="${p}" class="w-full h-full object-cover">
                            <button onclick="app.removeGeneralPhoto(${pIdx})" class="no-print absolute top-1 right-1 bg-red-500 hover:bg-red-600 text-white w-7 h-7 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-sm">
                                <i class="fa-solid fa-xmark text-sm"></i>
                            </button>
                        </div>
                    `).join('');
                }
            },

            // --- RENDERING VIEWS ---

            renderDashboard() {
                const list = document.getElementById('report-list');
                const emptyState = document.getElementById('empty-state');
                
                list.innerHTML = '';
                
                if (this.reports.length === 0) {
                    emptyState.classList.remove('hidden');
                    list.classList.add('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');
                list.classList.remove('hidden');

                const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;

                this.reports.forEach(report => {
                    const auditorInfo = report.meta.auditorName ? `Auditor: ${report.meta.auditorName}` : "No Auditor Name";
                    const guestInfo = report.meta.guestName ? `Guest: ${report.meta.guestName}` : "No Guest Info";
                    const date = report.meta.date || "No Date";
                    
                    const reportTimestamp = parseInt(report.id);
                    const ageInMs = Date.now() - reportTimestamp;
                    const canDelete = ageInMs >= THIRTY_DAYS_MS;
                    const daysRemaining = Math.ceil((THIRTY_DAYS_MS - ageInMs) / (1000 * 60 * 60 * 24));

                    const deleteBtnHtml = canDelete 
                        ? `<button onclick="app.deleteReport('${report.id}', event)" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100" title="Delete Report">
                                <i class="fa-solid fa-trash"></i>
                           </button>`
                        : `<button onclick="app.preventDelete(event, ${daysRemaining})" class="p-2 text-slate-200 cursor-not-allowed opacity-0 group-hover:opacity-100 focus:opacity-100" title="Retained for 30 days (${daysRemaining} days left)">
                                <i class="fa-solid fa-trash"></i>
                           </button>`;

                    const li = document.createElement('li');
                    li.className = "p-4 hover:bg-slate-50 cursor-pointer transition-colors flex items-center justify-between group";
                    li.onclick = () => this.openReport(report.id);
                    
                    li.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="bg-indigo-100 p-3 rounded-lg text-indigo-600">
                                <i class="fa-solid fa-utensils text-xl"></i>
                            </div>
                            <div>
                                <h3 class="font-semibold text-slate-900 text-lg">
                                    ${auditorInfo}
                                </h3>
                                <div class="flex items-center gap-3 text-sm text-slate-500 mt-1">
                                    <span><i class="fa-regular fa-calendar mr-1"></i> ${date}</span>
                                    <span>•</span><span>${guestInfo}</span>
                                </div>
                            </div>
                        </div>
                        ${deleteBtnHtml}
                    `;
                    list.appendChild(li);
                });
            },

            renderEditor() {
                const report = this.getCurrentReport();
                if (!report) return;

                // Populate Metadata
                document.getElementById('meta-date').value = report.meta.date || '';
                document.getElementById('meta-time').value = report.meta.time || '';
                document.getElementById('meta-session').value = report.meta.session || '';
                document.getElementById('meta-guestName').value = report.meta.guestName || '';
                document.getElementById('meta-roomNo').value = report.meta.roomNo || '';
                document.getElementById('meta-gsaName').value = report.meta.gsaName || '';
                document.getElementById('meta-supervisor').value = report.meta.supervisor || '';
                document.getElementById('meta-auditorName').value = report.meta.auditorName || '';
                
                document.getElementById('meta-observation').value = report.meta.observation || '';
                document.getElementById('print-meta-observation').textContent = report.meta.observation || '';

                this.renderChecklist();
                this.renderGeneralPhotos();
            },

            renderChecklist() {
                const report = this.getCurrentReport();
                const container = document.getElementById('checklist-container');
                container.innerHTML = '';
                
                let currentCategoryRender = '';

                let tableHtml = `
                    <div class="overflow-x-auto w-full">
                        <table class="w-full text-sm text-left border-collapse">
                            <thead class="text-xs text-slate-500 uppercase bg-slate-100 border-b border-slate-200 print:bg-transparent print:border-b-2 print:border-black">
                                <tr>
                                    <th class="p-3 w-10 text-center font-bold">#</th>
                                    <th class="p-3 w-1/2 min-w-[250px] font-bold">Audit Point</th>
                                    <th class="p-3 w-48 text-center no-print font-bold">Status</th>
                                    <th class="p-3 min-w-[200px] font-bold">Remarks</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 print:divide-slate-300">
                `;

                AUDIT_QUESTIONS.forEach((question, index) => {
                    const itemData = report.items[index] || { status: null, remarks: '', photos: [] };
                    
                    const isCompliant = itemData.status === 'compliant';
                    const isNonCompliant = itemData.status === 'non-compliant';
                    const isNA = itemData.status === 'na';

                    // Parse category and clean question text
                    const match = question.match(/^\[(.*?)\]/);
                    let categoryTitle = match ? match[1] : '';
                    let cleanQuestion = question.replace(/^\[(.*?)\]\s*/, '');
                    
                    // Render Section Header if category changes
                    if (categoryTitle && categoryTitle !== currentCategoryRender) {
                        tableHtml += `
                            <tr class="bg-indigo-50 border-y border-indigo-100 print:bg-slate-100 print:border-slate-300">
                                <td colspan="4" class="px-4 py-2 font-bold text-indigo-900 uppercase tracking-wide print:text-black">
                                    ${categoryTitle}
                                </td>
                            </tr>
                        `;
                        currentCategoryRender = categoryTitle;
                    }
                    
                    // Standard tabular layout for all questions
                    tableHtml += `
                        <tr class="hover:bg-slate-50/50 transition-colors avoid-break">
                            <td class="p-3 text-center text-slate-400 font-bold align-top">${index + 1}</td>
                            <td class="p-3 text-slate-800 font-medium align-top leading-snug">${cleanQuestion}</td>
                            
                            <td class="p-3 align-top no-print">
                                <div class="flex gap-1 justify-center">
                                    <button onclick="app.updateItemStatus(${index}, 'compliant')" 
                                        class="status-btn flex-1 py-1.5 px-1 border border-slate-200 rounded text-xs font-medium transition-colors ${isCompliant ? 'selected-compliant' : 'text-indigo-600 hover:bg-slate-100'}">
                                        Yes
                                    </button>
                                    <button onclick="app.updateItemStatus(${index}, 'non-compliant')" 
                                        class="status-btn flex-1 py-1.5 px-1 border border-slate-200 rounded text-xs font-medium transition-colors ${isNonCompliant ? 'selected-non-compliant' : 'text-indigo-600 hover:bg-slate-100'}">
                                        No
                                    </button>
                                    <button onclick="app.updateItemStatus(${index}, 'na')" 
                                        class="status-btn flex-1 py-1.5 px-1 border border-slate-200 rounded text-xs font-medium transition-colors ${isNA ? 'selected-na' : 'text-slate-500 hover:bg-slate-100'}">
                                        N/A
                                    </button>
                                </div>
                            </td>
                            
                            <td class="p-3 align-top">
                                <div class="hidden print:block font-bold text-xs mb-1">
                                    Status: 
                                    ${isCompliant ? '<span class="text-green-600">Yes</span>' : 
                                     isNonCompliant ? '<span class="text-red-600">No</span>' : 
                                     isNA ? '<span class="text-slate-500">N/A</span>' :
                                     '<span class="text-slate-400">Not Evaluated</span>'}
                                </div>
                                
                                <textarea rows="1" 
                                    onchange="app.updateItemRemarks(${index}, this.value)"
                                    placeholder="Add remarks..." 
                                    class="w-full text-sm p-2 border border-slate-200 rounded focus:ring-2 focus:ring-indigo-600 focus:border-indigo-600 outline-none print:hidden resize-none overflow-hidden"
                                    oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'">${itemData.remarks}</textarea>
                                
                                <div class="hidden print:block whitespace-pre-wrap text-sm">${itemData.remarks || ''}</div>
                            </td>
                        </tr>
                    `;
                });

                tableHtml += `
                            </tbody>
                        </table>
                    </div>
                `;
                
                container.innerHTML = tableHtml;
            }
        };

        // Initialize application on load
        window.onload = () => {
            app.init();
        };
    </script>
</body>
</html>
