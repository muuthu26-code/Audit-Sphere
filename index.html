<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Audit Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .audit-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .audit-card:active {
            transform: scale(0.97);
        }

        .status-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 9999px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .pulse-icon {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="safe-area-inset">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-slate-900 text-white px-6 py-4 shadow-lg border-b border-slate-800">
        <div class="flex items-center justify-between max-w-5xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="bg-sky-500 p-2 rounded-lg shadow-inner">
                    <i class="fa-solid fa-clipboard-check text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">Audit Central</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold">Hospitality Management</p>
                </div>
            </div>
            <div class="text-right">
                <div id="current-date" class="text-sm font-medium">-- --- ----</div>
                <div id="completion-stats" class="text-[10px] text-sky-400 font-bold">0% TOTAL COMPLETION</div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 md:p-6 space-y-8 pb-24">
        
        <!-- Summary Dashboard -->
        <section>
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                <i class="fa-solid fa-chart-pie"></i> Today's Overview
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Active Audits</p>
                    <p id="active-count" class="text-2xl font-black text-slate-800">9</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Critical Issues</p>
                    <p id="issue-count" class="text-2xl font-black text-rose-500">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Pending Sync</p>
                    <p id="sync-count" class="text-2xl font-black text-amber-500">None</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Avg Score</p>
                    <p id="avg-score" class="text-2xl font-black text-emerald-500">--%</p>
                </div>
            </div>
        </section>

        <!-- Audit Launchpad -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <i class="fa-solid fa-rocket"></i> Audit Launchpad
                </h2>
                <div class="flex gap-2">
                    <button onclick="dashboard.filter('all')" class="text-[10px] font-bold px-3 py-1 bg-slate-200 rounded-full text-slate-600 hover:bg-slate-300 transition-colors">ALL</button>
                    <button onclick="dashboard.filter('fo')" class="text-[10px] font-bold px-3 py-1 bg-white border border-slate-200 rounded-full text-slate-600 hover:bg-slate-100 transition-colors">F.O.</button>
                    <button onclick="dashboard.filter('fnb')" class="text-[10px] font-bold px-3 py-1 bg-white border border-slate-200 rounded-full text-slate-600 hover:bg-slate-100 transition-colors">F&B</button>
                </div>
            </div>

            <div id="audit-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Audit Cards injected here -->
            </div>
        </section>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-6 py-3 flex justify-around items-center md:hidden shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <button class="flex flex-col items-center gap-1 text-sky-600">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[9px] font-bold uppercase">Home</span>
        </button>
        <button onclick="dashboard.syncAll()" class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fa-solid fa-rotate text-lg"></i>
            <span class="text-[9px] font-bold uppercase">Sync</span>
        </button>
        <button onclick="dashboard.showSettings()" class="flex flex-col items-center gap-1 text-slate-400">
            <i class="fa-solid fa-gear text-lg"></i>
            <span class="text-[9px] font-bold uppercase">Settings</span>
        </button>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-medium opacity-0 pointer-events-none transition-all duration-300 shadow-xl z-[60]">
        Action successful
    </div>

    <script>
        const dashboard = {
            audits: [
                { id: 'checkin', name: 'Front Desk Check-In', file: 'checkin.html', icon: 'fa-bell-concierge', color: 'bg-sky-500', dept: 'fo', desc: 'Guest arrival & registration standards' },
                { id: 'checkout', name: 'Front Desk Check-Out', file: 'checkoutaudit.html', icon: 'fa-receipt', color: 'bg-blue-600', dept: 'fo', desc: 'Billing & departure efficiency' },
                { id: 'fssai', name: 'FSSAI Food Safety', file: 'fssai.html', icon: 'fa-shield-halved', color: 'bg-emerald-600', dept: 'fnb', desc: 'Compliance & hygiene audit' },
                { id: 'guestroom', name: 'Guest Room Audit', file: 'guestroomaudit.html', icon: 'fa-bed', color: 'bg-indigo-600', dept: 'fo', desc: 'Room setup & quality control' },
                { id: 'ird', name: 'In-Room Dining', file: 'irdaudit.html', icon: 'fa-tray', color: 'bg-teal-600', dept: 'fnb', desc: 'Service speed & presentation' },
                { id: 'mod', name: 'MOD Checklist', file: 'modchecklist.html', icon: 'fa-user-tie', color: 'bg-slate-700', dept: 'mgmt', desc: 'Manager on Duty daily walkthrough' },
                { id: 'mysouth', name: 'MySouth Audit', file: 'mysouth.html', icon: 'fa-pepper-hot', color: 'bg-rose-600', dept: 'fnb', desc: 'Signature restaurant standards' },
                { id: 'springbfast', name: 'Spring Breakfast', file: 'springbreakfastaudit.html', icon: 'fa-mug-hot', color: 'bg-amber-500', dept: 'fnb', desc: 'Morning buffet & service audit' },
                { id: 'springld', name: 'Spring Lunch/Dinner', file: 'springlunchdinner.html', icon: 'fa-utensils', color: 'bg-indigo-500', dept: 'fnb', desc: 'All-day dining operational check' }
            ],

            init() {
                this.renderDate();
                this.renderAudits();
                this.calculateOverallProgress();
            },

            renderDate() {
                const now = new Date();
                const options = { day: '2-digit', month: 'short', year: 'numeric' };
                document.getElementById('current-date').innerText = now.toLocaleDateString('en-GB', options).toUpperCase();
            },

            renderAudits(filter = 'all') {
                const container = document.getElementById('audit-grid');
                container.innerHTML = '';

                const filtered = filter === 'all' 
                    ? this.audits 
                    : this.audits.filter(a => a.dept === filter);

                filtered.forEach(audit => {
                    // Simulating progress check from localStorage (as the sub-files use it)
                    const savedData = localStorage.getItem(`audit_data_${audit.id}`);
                    let progress = 0;
                    if (savedData) {
                        try {
                            const parsed = JSON.parse(savedData);
                            const items = parsed.items || {};
                            const total = Object.keys(items).length;
                            const answered = Object.values(items).filter(v => v.status !== 'pending').length;
                            progress = total > 0 ? Math.round((answered / total) * 100) : 0;
                        } catch(e) {}
                    }

                    const card = document.createElement('div');
                    card.className = 'audit-card group bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:border-sky-200 cursor-pointer relative overflow-hidden';
                    card.onclick = () => this.launchAudit(audit.file);
                    
                    card.innerHTML = `
                        <div class="flex items-start justify-between relative z-10">
                            <div class="${audit.color} text-white p-3 rounded-xl shadow-lg mb-4 group-hover:scale-110 transition-transform">
                                <i class="fa-solid ${audit.icon} text-xl"></i>
                            </div>
                            <div class="status-badge ${progress === 100 ? 'bg-emerald-100 text-emerald-700' : progress > 0 ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500'}">
                                ${progress === 100 ? 'Completed' : progress > 0 ? 'In Progress' : 'Pending'}
                            </div>
                        </div>
                        <h3 class="font-bold text-slate-800 mb-1">${audit.name}</h3>
                        <p class="text-[11px] text-slate-500 leading-tight mb-4">${audit.desc}</p>
                        
                        <div class="mt-auto">
                            <div class="flex items-center justify-between text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-tighter">
                                <span>Progress</span>
                                <span>${progress}%</span>
                            </div>
                            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                <div class="${audit.color} h-full transition-all duration-1000" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        
                        <!-- Decorative background icon -->
                        <i class="fa-solid ${audit.icon} absolute -bottom-4 -right-4 text-6xl text-slate-50 opacity-[0.03] group-hover:opacity-[0.07] transition-opacity"></i>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('active-count').innerText = filtered.length;
            },

            launchAudit(file) {
                this.showToast(`Launching ${file}...`);
                // In a real environment, this would navigate. 
                // For this demo, we use window.location
                setTimeout(() => {
                    window.location.href = file;
                }, 500);
            },

            calculateOverallProgress() {
                let totalProgress = 0;
                this.audits.forEach(audit => {
                    const savedData = localStorage.getItem(`audit_data_${audit.id}`);
                    if (savedData) {
                        try {
                            const parsed = JSON.parse(savedData);
                            const items = parsed.items || {};
                            const total = Object.keys(items).length;
                            const answered = Object.values(items).filter(v => v.status !== 'pending').length;
                            totalProgress += total > 0 ? (answered / total) : 0;
                        } catch(e) {}
                    }
                });
                
                const avg = Math.round((totalProgress / this.audits.length) * 100);
                document.getElementById('completion-stats').innerText = `${avg}% TOTAL COMPLETION`;
                document.getElementById('avg-score').innerText = `${avg}%`;
            },

            filter(dept) {
                this.renderAudits(dept);
                // Update UI buttons
                const buttons = document.querySelectorAll('button[onclick^="dashboard.filter"]');
                buttons.forEach(btn => {
                    if (btn.getAttribute('onclick').includes(dept)) {
                        btn.className = "text-[10px] font-bold px-3 py-1 bg-slate-200 rounded-full text-slate-600 transition-colors";
                    } else {
                        btn.className = "text-[10px] font-bold px-3 py-1 bg-white border border-slate-200 rounded-full text-slate-600 hover:bg-slate-100 transition-colors";
                    }
                });
            },

            syncAll() {
                this.showToast("Synchronizing with server...");
                // Mock sync logic
                const icon = document.querySelector('.fa-rotate');
                icon.classList.add('fa-spin');
                setTimeout(() => {
                    icon.classList.remove('fa-spin');
                    this.showToast("Database is up to date");
                }, 2000);
            },

            showSettings() {
                this.showToast("Opening Settings...");
            },

            showToast(msg) {
                const toast = document.getElementById('toast');
                toast.innerText = msg;
                toast.style.opacity = '1';
                toast.style.bottom = '100px';
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.bottom = '80px';
                }, 2500);
            }
        };

        window.onload = () => dashboard.init();
    </script>
</body>
</html>
